function parseJSON(raw) {
  try { return JSON.parse(raw.replace(/```json|```/g,'').trim()); }
  catch { return null; }
}

function readingTime(text) {
  if (!text) return '—';
  const words = text.split(/\s+/).length;
  const mins = Math.max(1, Math.round(words / 200));
  return `${mins} min read`;
}

function formatMarkdown(text) {
  if (!text) return '';
  return text
    .replace(/^#{3}\s(.+)$/gm, '<h3>$1</h3>')
    .replace(/^#{2}\s(.+)$/gm, '<h2>$1</h2>')
    .replace(/^#{1}\s(.+)$/gm, '<h1>$1</h1>')
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.+?)\*/g, '<em>$1</em>')
    .replace(/^>\s(.+)$/gm, '<blockquote><p>$1</p></blockquote>')
    .replace(/^---$/gm, '<hr/>')
    .replace(/^[-*]\s(.+)$/gm, '<li>$1</li>')
    .replace(/(<li>.*<\/li>\n?)+/g, s => `<ul>${s}</ul>`)
    .replace(/^\d+\.\s(.+)$/gm, '<li>$1</li>')
    .replace(/\n{2,}/g, '</p><p>')
    .replace(/^(?!<[hublp])/gm, '<p>')
    .replace(/(?<![>])$/gm, '</p>')
    .replace(/<p><\/p>/g, '')
    .replace(/<p>(<[hublhr])/g, '$1')
    .replace(/(<\/[hublhr][^>]*>)<\/p>/g, '$1');
}

            <input className="gate-code-input" id={codeId} placeholder="Enter access code" onKeyDown={e=>e.key==='Enter'&&unlockAccess(codeId)}/>
            <button className="gate-code-btn" onClick={()=>unlockAccess(codeId)}>Unlock</button>
          </div>
        )}
      </div>
    </div>
  );

  return (
    <>
      <style>{css}</style>
      <div className="ai-root">
        <div className="ai-inner">

          {/* HEADER */}
          <div className="ai-header">
            <div className="ai-wordmark">Toolzyo<em>.</em></div>
            <h1 className="ai-title">AI<br/><span className="ai-grd">Intel</span></h1>
            <p className="ai-sub">Research any AI topic and instantly get a blog post, LinkedIn article, X thread, and newsletter section — ready to publish</p>
            <div className="ai-chips">
              <span className="chip cb"><Globe size={10}/> Deep Research</span>
              <span className="chip cp"><BookOpen size={10}/> Blog Posts</span>
              <span className="chip cc"><Rss size={10}/> Website Feed</span>
              <span className="chip cm"><Hash size={10}/> X Threads</span>
            </div>
          </div>

          <div className="ai-layout">

            {/* ── LEFT ──────────────────────────────────────────────────── */}
            <div>
              {/* TOPIC INPUT */}
              <div className="panel">
                <p className="panel-title"><Search size={16}/> Topic</p>
                <span className="eyebrow">What should we research?</span>
                <textarea className="t-input" rows={3}
                  placeholder="e.g. How AI agents are changing content workflows for creators..."
                  value={topic} onChange={e=>setTopic(e.target.value)}/>
                <div className="divider"/>
                <span className="eyebrow">Target Audience</span>
                <input className="t-input" type="text"
                  placeholder="e.g. creators and entrepreneurs"
                  value={audience} onChange={e=>setAudience(e.target.value)}/>
              </div>

              {/* FORMAT */}
              <div className="panel">
                <p className="panel-title"><FileText size={16}/> Output Format</p>
                <div className="fmt-grid">
                  {FORMATS.map(f=>(
                    <div key={f.id} className={`fmt-btn${format===f.id?' on':''}`} onClick={()=>setFormat(f.id)}>
                      {f.icon} {f.label}
                    </div>
                  ))}
                </div>
                <p style={{fontSize:'0.71rem',color:'rgba(240,242,255,0.28)',marginTop:'0.7rem',lineHeight:1.6}}>All 4 formats are generated every time — switch views in the output panel.</p>
              </div>

              {/* PRESETS */}
              <div className="panel">
                <p className="panel-title"><Radio size={16}/> Quick Topics</p>
                <p style={{fontSize:'0.77rem',color:'rgba(240,242,255,0.42)',marginBottom:'0.8rem',lineHeight:1.6}}>Pre-loaded topics for the AI Intel website feed:</p>
                <div className="preset-grid">
                  {PRESETS.map(cat=>(
                    <div key={cat.cat}>
                      <p className="preset-cat">{cat.cat}</p>
                      {cat.items.map(item=>(
                        <div key={item.title} className={`preset-btn${selectedPreset===item.title?' on':''}`} onClick={()=>selectPreset(item)}>
                          <div className="preset-ico" style={{background:item.bg}}>{item.icon}</div>
                          <div className="preset-text">
                            <p className="preset-title">{item.title}</p>
                            <p className="preset-sub">{item.sub}</p>
                          </div>
                          <ChevronRight size={13} color="rgba(240,242,255,0.25)" style={{marginLeft:'auto',flexShrink:0}}/>
                        </div>
                      ))}
                    </div>
                  ))}
                </div>
              </div>

              <button className={`btn btn-gen${isRunning?' running':''}`}
                disabled={isRunning||!topic.trim()}
                onClick={generate}>
                {isRunning
                  ? <><Loader size={15} className="spin"/> Researching & Writing...</>
                  : <><Zap size={15}/> Generate AI Intel Article</>}
              </button>

              {steps.length > 0 && (
                <div className="step-list" style={{marginTop:'1rem'}}>
                  {steps.map(s=>(
                    <div key={s.id} className={`step-item${s.status==='active'?' active':s.status==='done'?' done':''}`}>
                      <div className="sdot"/>
                      <span className="slabel">{s.status==='done'?'✓ ':s.status==='active'?'⟳ ':''}{s.label}</span>
                    </div>
                  ))}
                </div>
              )}
            </div>

            {/* ── RIGHT ─────────────────────────────────────────────────── */}
            <div>
              <div className="panel" style={{minHeight:520}}>

                {phase==='idle' && (
                  <div className="out-empty">
                    <Rss size={44} strokeWidth={1} color="#9D4EFF"/>
                    <p>Pick a topic preset or type your own — get a full article in all 4 formats</p>
                  </div>
                )}
                {isRunning && !result && (
                  <div className="out-empty">
                    <Loader size={38} strokeWidth={1} color="#9D4EFF" className="spin"/>
                    <p>Researching, outlining, and writing your AI Intel article...</p>
                  </div>
                )}
                {phase==='error' && (
                  <div className="out-empty">
                    <AlertCircle size={36} color="#ff8080"/>
                    <p style={{color:'#ff8080'}}>Something went wrong. Check your topic and try again.</p>
                  </div>
                )}

                {result && (
                  <>
                    {/* TABS */}
                    <div className="out-tabs">
                      <button className={`out-tab${activeTab==='article'?' on':''}`} onClick={()=>setActiveTab('article')}>
                        <BookOpen size={12}/> Article
                      </button>
                      <button className={`out-tab${activeTab==='formats'?' on':''}`} onClick={()=>setActiveTab('formats')}>
                        <Layers size={12}/> All Formats
                      </button>
                      <button className={`out-tab${activeTab==='seo'?' on':''}`} onClick={()=>setActiveTab('seo')}>
                        <Globe size={12}/> SEO & Meta
                      </button>
                    </div>

                    <div className="export-bar">
                      <button className="btn btn-cyan btn-sm" onClick={()=>gatedDownload(downloadHTML)}>
                        <Download size={11}/> Export for Website
                      </button>
                      <button className="btn btn-ghost btn-sm" onClick={()=>copy(getActiveContent(),'main')}>
                        {copied==='main'?<Check size={11}/>:<Copy size={11}/>} Copy {FORMATS.find(f=>f.id===format)?.label}
                      </button>
                    </div>

                    {/* ARTICLE TAB */}
                    {activeTab==='article' && (
                      <div className="gate-wrap">
                        <span className="gate-preview-badge">👁 Sample Preview — Title & TL;DR visible · Full article locked</span>
                      <>
                        {/* Editorial banner */}
                        <div className="editorial-banner">
                          <div className="banner-bg-mesh"/>
                          <div className="banner-grid-lines"/>
                          <div className="banner-dots">
                            {[0,1,2,3].map(r=>(
                              <div key={r} className="banner-dot-row">
                                {[0,1,2,3,4].map(c=><div key={c} className="banner-dot"/>)}
                              </div>
                            ))}
                          </div>
                          <div className="banner-content">
                            <span className="banner-cat"><Star size={10}/> {result.category||'AI Intel'}</span>
                            <h2 className="banner-title">{result.title}</h2>
                            <div className="banner-meta-row">
                              <span className="banner-meta-item"><Clock size={11}/> {result.readingTime||readingTime(result.blogPost)}</span>
                              <span className="banner-meta-item">·</span>
                              <span className="banner-meta-item">{new Date().toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})}</span>
                            </div>
                          </div>
                        </div>

                        {/* Banner image prompt */}
                        {result.bannerImagePrompt && (
                          <div className="img-prompt-box">
                            <div className="img-prompt-header">
                              <span className="img-prompt-label">🎨 Banner Image Prompt</span>
                              <div className="img-prompt-models">
                                <span className="img-model-tag">Midjourney</span>
                                <span className="img-model-tag">DALL-E 3</span>
                                <span className="img-model-tag">Flux</span>
                                <span className="img-model-tag">Ideogram</span>
                              </div>
                            </div>
                            <div className="img-prompt-text">{result.bannerImagePrompt}</div>
                            <div className="img-prompt-copy" onClick={()=>copy(result.bannerImagePrompt,'banner-prompt')}>
                              {copied==='banner-prompt' ? <Check size={11}/> : <Copy size={11}/>}
                              {copied==='banner-prompt' ? 'Copied!' : 'Copy Prompt'}
                            </div>
                          </div>
                        )}

                        {/* TL;DR */}
                        {result.tldr && (
                          <div style={{background:'rgba(42,47,255,0.08)',border:'1px solid rgba(42,47,255,0.2)',borderRadius:12,padding:'0.9rem 1.1rem',marginBottom:'1.3rem'}}>
                            <p style={{fontSize:'0.63rem',fontWeight:600,letterSpacing:'0.14em',textTransform:'uppercase',color:'#8b91ff',marginBottom:'0.3rem'}}>TL;DR</p>
                            <p style={{fontSize:'0.86rem',color:'rgba(240,242,255,0.78)',lineHeight:1.72}}>{result.tldr}</p>
                          </div>
                        )}

                        {/* Format switcher */}
                        <div style={{display:'flex',gap:'0.4rem',marginBottom:'1.1rem',flexWrap:'wrap'}}>
                          {FORMATS.map(f=>(
                            <div key={f.id} className={`fmt-btn${format===f.id?' on':''}`} style={{flex:'0 0 auto',padding:'0.38rem 0.8rem',fontSize:'0.7rem'}}
                              onClick={()=>setFormat(f.id)}>
                              {f.icon} {f.label}
                            </div>
                          ))}
                        </div>

                        {/* Blog post */}
                        {format==='blog' && (
                          isUnlocked
                            ? <div className="article-body" dangerouslySetInnerHTML={{__html: formatMarkdown(result.blogPost||'')}}/>
                            : <><div className="article-body" dangerouslySetInnerHTML={{__html: formatMarkdown((result.blogPost||'').split('\n\n').slice(0,3).join('\n\n'))}}/><div className="gate-blurred" style={{height:200,background:'rgba(7,10,32,0.4)',borderRadius:12,marginTop:'0.5rem'}}/></>
                        )}
                        {/* LinkedIn */}
                        {format==='linkedin' && (
                          <div style={{background:'rgba(7,10,32,0.7)',border:'1px solid rgba(10,102,194,0.25)',borderRadius:14,padding:'1.3rem',fontSize:'0.87rem',lineHeight:'1.82',color:'rgba(240,242,255,0.78)',whiteSpace:'pre-wrap'}}>
                            {result.linkedinPost}
                          </div>
                        )}
                        {/* X Thread */}
                        {format==='thread' && (
                          <div className="thread-posts">
                            {threads.map((t,i)=>(
                              <div key={i}>
                                <div className="thread-post">
                                  <span className="thread-num">{i+1}</span>
                                  <p className="thread-post-text">{t}</p>
                                </div>
                                {i < threads.length-1 && <div className="thread-connector"/>}
                              </div>
                            ))}
                          </div>
                        )}
                        {/* Newsletter */}
                        {format==='newsletter' && (
                          <div className="newsletter-wrap">
                            {result.newsletterSection?.includes('SUBJECT:') && (
                              <div className="newsletter-header">
                                <p className="newsletter-label">Subject Line</p>
                                <p className="newsletter-subject">{result.newsletterSection.split('\n')[0].replace('SUBJECT:','').trim()}</p>
                              </div>
                            )}
                            <div className="newsletter-body">
                              {result.newsletterSection?.replace(/^SUBJECT:.+\n/, '').trim()}
                            </div>
                          </div>
                        )}
                      </>
                      {!isUnlocked && <GateOverlay codeId="intelCode"/>}
                      </div>
                    )}

                    {/* ALL FORMATS TAB */}
                    {activeTab==='formats' && (
                      <div style={{display:'flex',flexDirection:'column',gap:'1.3rem'}}>
                        {[
                          { key:'linkedin', label:'LinkedIn Post', icon:<Linkedin size={13}/>, color:'rgba(10,102,194,0.22)', border:'rgba(10,102,194,0.25)', content: result.linkedinPost },
                          { key:'thread',   label:'X Thread',     icon:<Hash size={13}/>,     color:'rgba(255,255,255,0.05)', border:'rgba(255,255,255,0.12)', content: threads.join('\n\n---\n\n') },
                          { key:'newsletter',label:'Newsletter',  icon:<Mail size={13}/>,      color:'rgba(42,47,255,0.1)', border:'rgba(42,47,255,0.22)', content: result.newsletterSection },
                        ].map(f=>(
                          <div key={f.key}>
                            <div style={{display:'flex',alignItems:'center',gap:'0.5rem',marginBottom:'0.6rem'}}>
                              <p style={{fontSize:'0.67rem',fontWeight:600,letterSpacing:'0.13em',textTransform:'uppercase',color:'#9D4EFF',display:'flex',alignItems:'center',gap:'0.3rem'}}>{f.icon} {f.label}</p>
                              <button className="btn btn-ghost btn-sm" style={{marginLeft:'auto'}} onClick={()=>copy(f.content||'',f.key)}>
                                {copied===f.key?<Check size={10}/>:<Copy size={10}/>} Copy
                              </button>
                            </div>
                            <div style={{background:f.color,border:`1px solid ${f.border}`,borderRadius:12,padding:'1rem 1.1rem',fontSize:'0.83rem',lineHeight:'1.78',color:'rgba(240,242,255,0.72)',whiteSpace:'pre-wrap'}}>
                              {f.content}
                            </div>
                          </div>
                        ))}
                      </div>
                    )}

                    {/* SEO TAB */}
                    {activeTab==='seo' && (
                      <div>
                        <div className="seo-box">
                          <p className="seo-box-title"><Globe size={12}/> SEO Metadata</p>
                          <div className="seo-field">
                            <p className="seo-field-label">SEO Title ({(result.seoTitle||'').length} chars)</p>
                            <p className="seo-field-val">{result.seoTitle}</p>
                          </div>
                          <div className="seo-field">
                            <p className="seo-field-label">Meta Description ({(result.metaDescription||'').length} chars)</p>
                            <p className="seo-field-val">{result.metaDescription}</p>
                          </div>
                          <div className="seo-field">
                            <p className="seo-field-label">URL Slug</p>
                            <p className="seo-field-val slug">/{result.slug}</p>
                          </div>
                          <div className="seo-field">
                            <p className="seo-field-label">Tags</p>
                            <div className="seo-tags">
                              {(result.tags||[]).map((t,i)=><span key={i} className="seo-tag">#{t}</span>)}
                            </div>
                          </div>
                        </div>

                        <div style={{background:'rgba(7,10,32,0.6)',border:'1px solid rgba(123,43,255,0.15)',borderRadius:12,padding:'1rem 1.1rem',marginBottom:'1rem'}}>
                          <p style={{fontSize:'0.66rem',fontWeight:600,letterSpacing:'0.14em',textTransform:'uppercase',color:'#9D4EFF',marginBottom:'0.5rem'}}>Google Preview</p>
                          <p style={{fontSize:'0.85rem',color:'#8bb8ff',marginBottom:'0.25rem'}}>toolzyo.com/intel/{result.slug}</p>
                          <p style={{fontSize:'0.88rem',color:'#c084fc',fontWeight:600,marginBottom:'0.22rem'}}>{result.seoTitle}</p>
                          <p style={{fontSize:'0.8rem',color:'rgba(240,242,255,0.55)',lineHeight:1.6}}>{result.metaDescription}</p>
                        </div>

                        <div className="export-bar">
                          <button className="btn btn-cyan btn-sm" onClick={()=>copy(`<title>${result.seoTitle}</title>\n<meta name="description" content="${result.metaDescription}"/>`,'meta')}>
                            {copied==='meta'?<Check size={11}/>:<Copy size={11}/>} Copy Meta Tags
                          </button>
                          <button className="btn btn-ghost btn-sm" onClick={()=>gatedDownload(downloadHTML)}>
                            <Download size={11}/> Full HTML Page
                          </button>
                        </div>
                      </div>
                    )}
                  </>
                )}
              </div>
            </div>
          </div>
        </div>
      </div>
      {toast && <div className="toast"><Check size={13}/> {toast}</div>}

      {showPaywall && (
        <div className="pw-overlay" onClick={e=>{ if(e.target===e.currentTarget){ setShowPaywall(false); } }}>
          <div className="pw-card">
            <div className="pw-lock">🔒</div>
            <h2 className="pw-title">Your results are ready to save</h2>
            <p className="pw-sub">Generate freely — download your personalized output when you're on a package or grab one-time access.</p>
            <div className="pw-options">
              <button className="pw-opt pw-opt-primary" onClick={()=>{ setShowPaywall(false); window.open('https://toolzyo.com/#pricing','_blank'); }}>
                <div className="pw-opt-label">📦 View Packages</div>
                <div className="pw-opt-text">Content Engine · Full Service · Strategy Snapshot</div>
                <div className="pw-opt-price">From $397 · Includes unlimited downloads</div>
              </button>
              <button className="pw-opt pw-opt-secondary" onClick={()=>{ setShowPaywall(false); window.open('https://toolzyo.com/vault','_blank'); }}>
                <div className="pw-opt-label">⚡ One-Time Download</div>
                <div className="pw-opt-text">Pay once, download this result now</div>
                <div className="pw-opt-price">$9 per export — available in The Vault</div>
              </button>
            </div>
            <div className="pw-divider"/>
            <p className="pw-code-lbl">Already have access? Enter your code</p>
            <div className="pw-code-row">
              <input className="pw-code-input" id="pwCodeInput" placeholder="Access code" type="text" onKeyDown={e=>e.key==='Enter'&&unlockWithCode('pwCodeInput')}/>
              <button className="pw-code-btn" onClick={()=>unlockWithCode('pwCodeInput')}>Unlock</button>
            </div>
            <button className="pw-dismiss" onClick={()=>setShowPaywall(false)}>Continue browsing without downloading</button>
          </div>
        </div>
      )}

    </>
  );
}


const container = document.getElementById('root');
const root = ReactDOM.createRoot(container);
root.render(React.createElement(ToolzyoAIIntel));
</script>
</body>
</html>
