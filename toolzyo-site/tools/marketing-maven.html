function parsePlan(raw) {
  const result = { content:'', social:'', partner:'' };
  const markers = [
    { key:'content', re:/##\s*content marketing/i },
    { key:'social',  re:/##\s*social media/i },
    { key:'partner', re:/##\s*partnership/i },
  ];
  const lines = raw.split('\n');
  let cur = null;
  const buffers = { content:[], social:[], partner:[] };
  for (const line of lines) {
    const hit = markers.find(m => m.re.test(line));
    if (hit) { cur = hit.key; continue; }
    if (cur) buffers[cur].push(line);
  }
  for (const k of Object.keys(result)) {
    result[k] = buffers[k].join('\n').trim();
  }
  if (!result.content && !result.social && !result.partner) {
    const thirds = Math.ceil(lines.length / 3);
    result.content = lines.slice(0, thirds).join('\n');
    result.social  = lines.slice(thirds, thirds*2).join('\n');
    result.partner = lines.slice(thirds*2).join('\n');
  }
  return result;
}

function extractSection(text) {
  if (!text) return { topIdea:'Strategy Pending', description:'', pros:['High potential reach','Builds brand authority'], cons:['Requires consistent effort','Results take time'], nextSteps:['Define your content calendar','Set measurable KPIs','Launch a pilot campaign'], allIdeas:[] };
  const lines = text.split('\n').filter(l => l.trim());

  const ideas = lines
    .filter(l => /^\d+\.|^[-*•]/.test(l.trim()))
    .map(l => l.replace(/^\d+\.|^[-*•]|\*\*/g,'').trim())
    .filter(l => l.length > 4 && l.length < 110)
    .slice(0, 5);

  const prosIdx  = lines.findIndex(l => /\bpros\b|advantage|benefit/i.test(l));
  const consIdx  = lines.findIndex(l => /\bcons\b|disadvantage|challenge|downside/i.test(l));
  const nextIdx  = lines.findIndex(l => /next step|action item|checklist/i.test(l));
  const topIdx   = lines.findIndex(l => /top pick|best idea|recommended|\*\*top/i.test(l));

  const bullets = (start, end) => {
    if (start < 0) return [];
    const sl = end > start ? lines.slice(start+1, end) : lines.slice(start+1, start+5);
    return sl.filter(l=>l.trim()).map(l=>l.replace(/^[-*•\d.]+/,'').trim()).filter(l=>l.length>3).slice(0,3);
  };

  const pros = bullets(prosIdx, consIdx > prosIdx ? consIdx : prosIdx+5);
  const cons = bullets(consIdx, nextIdx > consIdx ? nextIdx : consIdx+5);
  const nextSteps = bullets(nextIdx, nextIdx+5);

  const topLine = topIdx >= 0 ? lines[topIdx] : lines.find(l => /\*\*/.test(l)) || ideas[0] || '';
  const topIdea = topLine.replace(/\*\*/g,'').replace(/^[-*•\d.]+|top pick:|best idea:|recommended:/gi,'').trim() || 'Top Strategy';

  const descLines = lines
    .filter((l,i) => i > 0 && i < Math.max(2, prosIdx > 0 ? prosIdx : 5))
    .filter(l => l.trim() && !/\*\*/.test(l) && !/pros|cons|next|^\d+\./i.test(l))
    .slice(0, 2).map(l => l.trim());

  return {
    topIdea,
    description: descLines.join(' ') || text.slice(0, 200),
    pros: pros.length ? pros : ['High potential reach','Aligns with brand goals','Scalable over time'],
    cons: cons.length ? cons : ['Requires consistency','Results take time'],
    nextSteps: nextSteps.length ? nextSteps : ['Create a detailed action plan','Set weekly milestones','Track and iterate'],
    allIdeas: ideas,
  };
}

              <span className="chip chip-b"><Target size={10}/> Content Strategy</span>
              <span className="chip chip-p"><Share2 size={10}/> Social Campaigns</span>
              <span className="chip chip-c"><Eye size={10}/> Vision Board</span>
            </div>
          </div>

          <div className="mm-layout">

            {/* ── LEFT ────────────────────────────────────────────────── */}
            <div>
              <div className="panel">
                <p className="panel-title"><Sparkles size={16}/> Product Brief</p>

                <p className="eyebrow">Product Name *</p>
                <input className="t-input" type="text" placeholder="e.g. Toolzyo Studio"
                  value={productName} onChange={e=>setProductName(e.target.value)}/>
                <div className="divider"/>
                <p className="eyebrow">Product Description *</p>
                <textarea className="t-input" rows={3}
                  placeholder="What does it do? Who is it for? What problem does it solve?"
                  value={productDesc} onChange={e=>setProductDesc(e.target.value)} maxLength={400}/>
                <p className="char-count">{productDesc.length}/400</p>
                <div className="divider"/>
                <p className="eyebrow">One-Sentence Value Prop</p>
                <input className="t-input" type="text"
                  placeholder="e.g. The fastest way for creators to build AI digital products"
                  value={valueProp} onChange={e=>setValueProp(e.target.value)}/>
              </div>

              <div className="panel">
                <p className="panel-title"><TrendingUp size={16}/> Market Context</p>
                <p className="eyebrow">Industry</p>
                <div className="pill-row">
                  {INDUSTRIES.map(ind=>(
                    <button key={ind} className={`pill${industry===ind?' on':''}`}
                      onClick={()=>setIndustry(industry===ind?'':ind)}>{ind}</button>
                  ))}
                </div>
                <div className="divider"/>
                <p className="eyebrow">Target Platforms</p>
                <div className="platform-grid">
                  {PLATFORMS.map(p=>(
                    <div key={p.id} className={`plat${platforms.includes(p.id)?' on':''}`}
                      onClick={()=>togglePlat(p.id)}>
                      <span className="plat-icon">{p.icon}</span>{p.label}
                    </div>
                  ))}
                </div>
                <div className="divider"/>
                <p className="eyebrow">Primary Goal</p>
                <div className="pill-row">
                  {GOALS.map(g=>(
                    <button key={g} className={`pill${goal===g?' on':''}`}
                      onClick={()=>setGoal(g)}>{g}</button>
                  ))}
                </div>
              </div>

              <button className={`btn btn-gen${isRunning?' running':''}`}
                disabled={isRunning||!productName.trim()||!productDesc.trim()}
                onClick={generate}>
                {isRunning
                  ? <><Loader size={15} className="spin"/> Generating Plan...</>
                  : <><Zap size={15}/> Generate Marketing Plan</>}
              </button>

              {(isRunning||phase==='done'||phase==='error') && (
                <div className="step-list" style={{marginTop:'1rem'}}>
                  {steps.map(s=>(
                    <div key={s.id} className={`step-item${s.status==='active'?' active':s.status==='done'?' done':''}`}>
                      <div className="sdot"/>
                      <span className="slabel">{s.status==='done'?'✓ ':s.status==='active'?'⟳ ':''}{s.label}</span>
                    </div>
                  ))}
                </div>
              )}
            </div>

            {/* ── RIGHT ───────────────────────────────────────────────── */}
            <div>
              <div className="panel" style={{minHeight:480}}>

                {phase==='idle' && (
                  <div className="out-empty">
                    <Target size={44} strokeWidth={1} color="#9D4EFF"/>
                    <p>Fill in your product brief and generate</p>
                  </div>
                )}
                {isRunning&&!structured && (
                  <div className="out-empty">
                    <Loader size={38} strokeWidth={1} color="#9D4EFF" className="spin"/>
                    <p>Building your marketing plan...</p>
                  </div>
                )}
                {phase==='error' && (
                  <div className="out-empty">
                    <p style={{color:'#ff5449'}}>Something went wrong. Try again.</p>
                  </div>
                )}

                {structured && (
                  <>
                    <div className="tabs">
                      <button className={`tab${activeTab==='plan'?' on':''}`} onClick={()=>setActiveTab('plan')}>
                        <FileText size={13}/> Marketing Plan
                      </button>
                      <button className={`tab${activeTab==='board'?' on':''}`} onClick={()=>setActiveTab('board')}>
                        <LayoutGrid size={13}/> Vision Board
                      </button>
                    </div>

                    {activeTab==='plan' && (
                      <div className="gate-wrap">
                        <span className="gate-preview-badge">👁 Sample Preview — First strategy visible · Full plan locked</span>
                      <>
                        <div className="export-bar" style={{marginBottom:'1.2rem'}}>
                          <button className="btn btn-ghost btn-sm" onClick={copyRaw}><Copy size={12}/> Copy Raw</button>
                          <button className="btn btn-cyan btn-sm" onClick={()=>gatedDownload(downloadReport)}><Download size={12}/> Download Report</button>
                        </div>
                        {CATS.map(cat=>{
                          const d = structured[cat.key];
                          if (!d) return null;
                          const open = expanded[cat.key];
                          return (
                            <div key={cat.key} className="cat-card">
                              <div className="cat-header" onClick={()=>toggleExp(cat.key)}>
                                <div className={`cat-icon-wrap ${cat.iconClass}`}>{cat.icon}</div>
                                <span className="cat-title">{cat.label}</span>
                                {open ? <Minus size={14} color="rgba(240,242,255,0.4)"/> : <Plus size={14} color="rgba(240,242,255,0.4)"/>}
                              </div>
                              {open && (
                                <div className="cat-body">
                                  {d.allIdeas.length > 0 && (
                                    <>
                                      <p className="eyebrow" style={{marginBottom:'0.5rem'}}>Ideas Generated</p>
                                      <div className="ideas-grid" style={{marginBottom:'1rem'}}>
                                        {d.allIdeas.map((idea,i)=>(
                                          <div key={i} className="idea-item">{idea}</div>
                                        ))}
                                      </div>
                                    </>
                                  )}
                                  <div className="top-idea">
                                    <p className="idea-label">★ Top Pick</p>
                                    <p className="idea-title">{d.topIdea}</p>
                                    <p className="idea-desc">{d.description}</p>
                                  </div>
                                  <div className="proscons">
                                    <div className="pc-block pros">
                                      <p className="pc-label">Pros</p>
                                      {d.pros.map((p,i)=><p key={i} className="pc-item">{p}</p>)}
                                    </div>
                                    <div className="pc-block cons">
                                      <p className="pc-label">Cons</p>
                                      {d.cons.map((c,i)=><p key={i} className="pc-item">{c}</p>)}
                                    </div>
                                  </div>
                                  <p className="eyebrow">Next Steps</p>
                                  <div className="steps-list">
                                    {d.nextSteps.map((s,i)=>(
                                      <div key={i} className="nstep">
                                        <div className="nstep-num">{i+1}</div>
                                        <p className="nstep-text">{s}</p>
                                      </div>
                                    ))}
                                  </div>
                                </div>
                              )}
                            </div>
                          );
                        })}
                      </>
                      {!isUnlocked && <GateOverlay codeId="mavenCode"/>}
                      </div>
                    )}

                    {activeTab==='board' && (
                      <div className="gate-wrap">
                        <span className="gate-preview-badge">👁 Sample Preview — First concept visible · Full board locked</span>
                      <>
                        <p style={{fontSize:'0.82rem',color:'rgba(240,242,255,0.45)',marginBottom:'1.2rem',lineHeight:1.65}}>
                          Visual campaign concepts — use as creative direction for your designer or content team.
                        </p>
                        <div className="vb-grid">
                          {CATS.map(cat=>{
                            const d = structured[cat.key];
                            const v = VB_CONFIG[cat.key];
                            if (!d) return null;
                            return (
                              <div key={cat.key} className="vb-card">
                                <div className={`vb-bg ${v.bgClass}`}/>
                                {v.blobs.map((b,i)=>(
                                  <div key={i} className="vb-blob" style={{width:b.w,height:b.h,top:b.top,left:b.left,right:b.right,bottom:b.bottom,background:b.color}}/>
                                ))}
                                <div className="vb-overlay"/>
                                <div className="vb-content">
                                  <p className="vb-cat" style={{color:v.catColor}}>{cat.label}</p>
                                  <p className="vb-idea-title">{d.topIdea}</p>
                                  <div className="vb-keywords">
                                    {v.kws.map(kw=><span key={kw} className="vb-kw">{kw}</span>)}
                                  </div>
                                </div>
                              </div>
                            );
                          })}
                        </div>
                        <div className="export-bar" style={{marginTop:'1.2rem'}}>
                          <button className="btn btn-cyan btn-sm" onClick={()=>gatedDownload(downloadReport)}><Download size={12}/> Download Full Report</button>
                        </div>

                        {/* Vision board image prompts */}
                        {imgPrompts && (
                          <div style={{marginTop:'1.6rem'}}>
                            <p className="eyebrow" style={{marginBottom:'0.25rem'}}>🎨 Image Gen Prompts</p>
                            <p style={{fontSize:'0.77rem',color:'rgba(240,242,255,0.38)',marginBottom:'1rem',lineHeight:1.65}}>
                              Drop these into Midjourney, DALL-E 3, Flux, or Ideogram to generate real campaign visuals.
                            </p>
                            {CATS.map(cat => imgPrompts[cat.key] ? (
                              <div key={cat.key} className="img-prompt-box" style={{marginBottom:'0.8rem'}}>
                                <div className="img-prompt-header">
                                  <span className="img-prompt-label">🎨 {cat.label}</span>
                                  <div className="img-prompt-models">
                                    <span className="img-model-tag">Midjourney</span>
                                    <span className="img-model-tag">DALL-E 3</span>
                                    <span className="img-model-tag">Flux</span>
                                    <span className="img-model-tag">Ideogram</span>
                                  </div>
                                </div>
                                <div className="img-prompt-text">{imgPrompts[cat.key]}</div>
                                <div className="img-prompt-copy" onClick={()=>{
                                  navigator.clipboard.writeText(imgPrompts[cat.key]);
                                  setCopiedPrompt(cat.key);
                                  setTimeout(()=>setCopiedPrompt(''), 2000);
                                }}>
                                  {copiedPrompt===cat.key ? <Check size={11}/> : <Copy size={11}/>}
                                  {copiedPrompt===cat.key ? 'Copied!' : 'Copy Prompt'}
                                </div>
                              </div>
                            ) : null)}
                          </div>
                        )}

                        {/* Loading state while prompts generate */}
                        {!imgPrompts && phase==='done' && (
                          <div style={{marginTop:'1.4rem',padding:'1rem',borderRadius:12,border:'1px solid rgba(196,0,255,0.14)',background:'rgba(196,0,255,0.04)',display:'flex',alignItems:'center',gap:'0.6rem'}}>
                            <Loader size={13} color="#C400FF" style={{animation:'spin 0.8s linear infinite',flexShrink:0}}/>
                            <p style={{fontSize:'0.75rem',color:'rgba(240,242,255,0.4)'}}>Generating image prompts for each concept...</p>
                          </div>
                        )}
                      </>
                      {!isUnlocked && <GateOverlay codeId="mavenCodeB"/>}
                      </div>
                    )}
                  </>
                )}
              </div>
            </div>

          </div>
        </div>
      </div>
      {toast && <div className="toast"><Check size={13}/> Copied to clipboard</div>}

      {showPaywall && (
        <div className="pw-overlay" onClick={e=>{ if(e.target===e.currentTarget){ setShowPaywall(false); } }}>
          <div className="pw-card">
            <div className="pw-lock">🔒</div>
            <h2 className="pw-title">Your results are ready to save</h2>
            <p className="pw-sub">Generate freely — download your personalized output when you're on a package or grab one-time access.</p>
            <div className="pw-options">
              <button className="pw-opt pw-opt-primary" onClick={()=>{ setShowPaywall(false); window.open('https://toolzyo.com/#pricing','_blank'); }}>
                <div className="pw-opt-label">📦 View Packages</div>
                <div className="pw-opt-text">Content Engine · Full Service · Strategy Snapshot</div>
                <div className="pw-opt-price">From $397 · Includes unlimited downloads</div>
              </button>
              <button className="pw-opt pw-opt-secondary" onClick={()=>{ setShowPaywall(false); window.open('https://toolzyo.com/vault','_blank'); }}>
                <div className="pw-opt-label">⚡ One-Time Download</div>
                <div className="pw-opt-text">Pay once, download this result now</div>
                <div className="pw-opt-price">$9 per export — available in The Vault</div>
              </button>
            </div>
            <div className="pw-divider"/>
            <p className="pw-code-lbl">Already have access? Enter your code</p>
            <div className="pw-code-row">
              <input className="pw-code-input" id="pwCodeInput" placeholder="Access code" type="text" onKeyDown={e=>e.key==='Enter'&&unlockWithCode('pwCodeInput')}/>
              <button className="pw-code-btn" onClick={()=>unlockWithCode('pwCodeInput')}>Unlock</button>
            </div>
            <button className="pw-dismiss" onClick={()=>setShowPaywall(false)}>Continue browsing without downloading</button>
          </div>
        </div>
      )}

    </>
  );
}


const container = document.getElementById('root');
const root = ReactDOM.createRoot(container);
root.render(React.createElement(ToolzyoMarketingMaven));
</script>
</body>
</html>
