function parseJSON(raw) {
  try { return JSON.parse(raw.replace(/```json|```/g,'').trim()); }
  catch { return null; }
}

async function geocodeLocation(query) {
  const url = `https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(query)}&format=json&limit=1`;
  const res = await fetch(url, { headers:{ 'Accept-Language':'en' } });
  const data = await res.json();
  if (!data.length) throw new Error('Location not found');
  const { lat, lon, boundingbox } = data[0];
  return {
    lat: parseFloat(lat), lng: parseFloat(lon),
    bbox: [parseFloat(boundingbox[0]), parseFloat(boundingbox[2]), parseFloat(boundingbox[1]), parseFloat(boundingbox[3])]
  };
}

function buildOverpassQuery(term, south, west, north, east) {
  const box = `${south},${west},${north},${east}`;
  const t = term.toLowerCase().trim();

  const AMENITY = { restaurant:'restaurant', cafe:'cafe', coffee:'cafe', bar:'bar', pub:'pub',
    gym:'gym', hospital:'hospital', clinic:'clinic', dentist:'dentist', doctor:'doctors',
    pharmacy:'pharmacy', bank:'bank', school:'school', university:'university',
    lawyer:'lawyer', attorney:'lawyer', accountant:'accountant' };
  const SHOP = { bakery:'bakery', salon:'hairdresser', barber:'hairdresser',
    grocery:'supermarket', bookstore:'books', clothing:'clothes', florist:'florist' };
  const OFFICE = { agency:'company', studio:'company', marketing:'marketing',
    consulting:'consulting', realestate:'estate_agent', 'real estate':'estate_agent' };
  const LEISURE = { gym:'fitness_centre', fitness:'fitness_centre', spa:'spa', pool:'swimming_pool' };
  const TOURISM = { hotel:'hotel', hostel:'hostel', motel:'motel' };

function resultToRow(r) {
  return {
    id: r.id,
    name: r.tags?.name || 'Unnamed',
    type: r.tags?.amenity || r.tags?.shop || r.tags?.office || r.tags?.leisure || r.tags?.tourism || r.tags?.building || 'business',
    address: [r.tags?.['addr:housenumber'], r.tags?.['addr:street'], r.tags?.['addr:city']].filter(Boolean).join(' ') || '',
    phone: r.tags?.phone || r.tags?.['contact:phone'] || '',
    website: r.tags?.website || r.tags?.['contact:website'] || '',
    lat: r.lat || r.center?.lat || null,
    lng: r.lon || r.center?.lon || null,
  };
}

function exportCSV(results) {
  const header = 'Name,Type,Address,Phone,Website,Lat,Lng\n';
  const rows = results.map(r => [r.name,r.type,r.address,r.phone,r.website,r.lat,r.lng].map(v=>`"${(v||'').toString().replace(/"/g,'""')}"`).join(',')).join('\n');
  download(header+rows, 'leads.csv', 'text/csv');
}

function exportTXT(results) {
  const txt = results.map((r,i) => `${i+1}. ${r.name}\n   Type: ${r.type}\n   Address: ${r.address||'—'}\n   Phone: ${r.phone||'—'}\n   Website: ${r.website||'—'}\n`).join('\n');
  download(txt, 'leads.txt', 'text/plain');
}

function exportMD(results) {
  const header = '| # | Name | Type | Address | Phone | Website |\n|---|------|------|---------|-------|---------|';
  const rows = results.map((r,i) => `| ${i+1} | ${r.name} | ${r.type} | ${r.address||'—'} | ${r.phone||'—'} | ${r.website ? `[link](${r.website})`:'—'} |`).join('\n');
  download('# Leads Export\n\n'+header+'\n'+rows, 'leads.md', 'text/markdown');
}

function download(content, filename, type) {
  const blob = new Blob([content], {type});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href=url; a.download=filename; a.click();
  URL.revokeObjectURL(url);
}

          <button className="gate-opt gate-opt-month" onClick={()=>{ window.open('https://toolzyo.com/checkout?plan=14day','_blank'); }}>
            <div className="gate-opt-label">This Tool · 14 Days</div>
            <div className="gate-opt-price">$127</div>
            <div className="gate-opt-desc">Unlimited use of this tool for 14 days · all results unlocked</div>
          </button>
        </div>
        <div className="gate-divider">
          <div className="gate-divider-line"/>
          <span className="gate-divider-text">or let us do it for you</span>
          <div className="gate-divider-line"/>
        </div>
        <button className="gate-opt gate-opt-dfy" style={{width:'100%',marginBottom:'0.65rem'}} onClick={()=>window.open('https://toolzyo.com/#pricing','_blank')}>
          <div className="gate-opt-label" style={{color:'#fbbf24'}}>⭐ Done-For-You — Strategy Snapshot</div>
          <div className="gate-opt-price" style={{background:'linear-gradient(135deg,#fbbf24,#f59e0b)',WebkitBackgroundClip:'text',WebkitTextFillColor:'transparent',backgroundClip:'text'}}>$397</div>
          <div className="gate-opt-desc">Haze runs this for your business, delivers the polished report — you do nothing</div>
        </button>
        <button className="gate-call-btn" onClick={()=>window.open('https://toolzyo.com/#start','_blank')}>
          📅 Book a discovery call first — talk through it live
        </button>
        {!showCodeEntry && (
          <button className="gate-already" onClick={()=>setShowCodeEntry(true)}>Already have an access code?</button>
        )}
        {showCodeEntry && (
          <div className="gate-code-row">
            <input className="gate-code-input" id={codeId} placeholder="Enter access code" onKeyDown={e=>e.key==='Enter'&&unlockAccess(codeId)}/>
            <button className="gate-code-btn" onClick={()=>unlockAccess(codeId)}>Unlock</button>
          </div>
        )}
      </div>
    </div>
  );

  return (
    <>
      <style>{css}</style>
      <div className="le-root">
        <div className="le-inner">

          {/* HEADER */}
          <div className="le-header">
            <div className="le-wordmark">Toolzyo<em>.</em></div>
            <h1 className="le-title">Lead<br/><span className="le-grd">Engine</span></h1>
            <p className="le-sub">Find leads on a live map · Write AI outreach sequences · Generate legally-sound contracts</p>
          </div>

          {/* PART TABS */}
          <div className="part-tabs">
            {[
              { id:'finder',   icon:<MapPin size={14}/>,       label:'Lead Finder' },
              { id:'outreach', icon:<Mail size={14}/>,         label:'Outreach Sequences' },
              { id:'contract', icon:<Shield size={14}/>,       label:'Contract Writer' },
            ].map(t => (
              <button key={t.id} className={`part-tab${activeTab===t.id?' on':''}`} onClick={()=>setActiveTab(t.id)}>
                <span className="tab-num">{t.id==='finder'?1:t.id==='outreach'?2:3}</span>
                {t.icon} {t.label}
              </button>
            ))}
          </div>

          {/* ══════════════════════════════════
              PART 1 — LEAD FINDER
          ══════════════════════════════════ */}
          {activeTab==='finder' && (
            <div className="finder-layout">
              {/* Left panel */}
              <div>
                <div className="panel" style={{marginBottom:'1.2rem'}}>
                  <p className="panel-title"><Search size={16}/> Search</p>

                  <span className="eyebrow">Location</span>
                  <input className="t-input" placeholder="e.g. Miami, Florida or London, UK"
                    value={locationQ} onChange={e=>setLocationQ(e.target.value)}
                    onKeyDown={e=>e.key==='Enter'&&handleSearch()}/>

                  <div style={{marginTop:'0.75rem'}}>
                    <span className="eyebrow">Business Type / Search Term</span>
                    <input className="t-input" placeholder="e.g. marketing agency, dentist, John Smith..."
                      value={businessQ} onChange={e=>setBusinessQ(e.target.value)}
                      onKeyDown={e=>e.key==='Enter'&&handleSearch()}/>
                  </div>

                  <div className="search-btn-row">
                    <button className={`btn btn-gen${isSearching?' running':''}`}
                      disabled={isSearching||!locationQ.trim()||!businessQ.trim()}
                      onClick={handleSearch}>
                      {isSearching ? <><Loader size={14} className="spin"/> Searching...</> : <><Search size={14}/> Search</>}
                    </button>
                  </div>

                  <p style={{fontSize:'0.69rem',color:'rgba(240,242,255,0.28)',marginTop:'0.7rem',lineHeight:1.65}}>
                    Live data from OpenStreetMap via Overpass API. Contact details vary by listing.
                  </p>
                </div>

                {results.length > 0 && (
                  <div className="panel">
                    <div className="results-header">
                      <p className="results-count">{results.length} results found</p>
                      <div className="export-btns">
                        <button className="btn btn-ghost btn-sm" onClick={()=>gatedDownload(()=>exportCSV(results))}><Download size={10}/> CSV</button>
                        <button className="btn btn-ghost btn-sm" onClick={()=>gatedDownload(()=>exportTXT(results))}><Download size={10}/> TXT</button>
                        <button className="btn btn-ghost btn-sm" onClick={()=>gatedDownload(()=>exportMD(results))}><Download size={10}/> MD</button>
                      </div>
                    </div>
                    <div className="gate-wrap">
                    <span className="gate-preview-badge">👁 Sample Preview — First 3 leads visible · Full list locked</span>
                    <div className="result-list">
                      {(isUnlocked ? results : results.slice(0,3)).map(r => (
                        <div key={r.id} className={`result-item${selectedResult?.id===r.id?' selected':''}`}
                          onClick={()=>setSelectedResult(r)}>
                          <div className="result-ico"><Building2 size={15}/></div>
                          <div className="result-info">
                            <p className="result-name">{r.name}</p>
                            <div className="result-meta">
                              {r.address && <span><MapPin size={10}/> {r.address}</span>}
                              {r.phone   && <span><Phone size={10}/> {r.phone}</span>}
                              {r.website && <span><Globe size={10}/> {r.website}</span>}
                            </div>
                          </div>
                          <div style={{display:'flex',flexDirection:'column',gap:'0.35rem',alignItems:'flex-end',flexShrink:0}}>
                            <span className="result-type-badge">{r.type}</span>
                            <span className="use-lead-btn" onClick={e=>{e.stopPropagation();useAsLead(r);}}>
                              Use as Lead →
                            </span>
                          </div>
                        </div>
                      ))}
                    </div>
                  </div>
                )}

                {searchErr && (
                  <div style={{padding:'1rem',borderRadius:12,border:'1px solid rgba(255,80,80,0.2)',background:'rgba(255,80,80,0.05)',display:'flex',gap:'0.5rem',alignItems:'flex-start',marginTop:'0.5rem'}}>
                    <AlertCircle size={14} color="#ff8080" style={{flexShrink:0,marginTop:'0.1rem'}}/>
                    <p style={{fontSize:'0.77rem',color:'#ff8080',lineHeight:1.65}}>{searchErr}</p>
                  </div>
                )}
              </div>

              {/* Map */}
              <div>
                <div className="map-wrap">
                  {!leafletReady ? (
                    <div className="map-placeholder">
                      <Loader size={28} strokeWidth={1} color="#9D4EFF" className="spin"/>
                      <p>Loading map...</p>
                    </div>
                  ) : (
                    <div id="le-map" ref={mapRef} style={{height:'100%',width:'100%'}}/>
                  )}
                </div>
                {results.length > 0 && selectedResult && (
                  <div className="panel" style={{marginTop:'1rem'}}>
                    <p className="panel-title"><Building2 size={15}/> {selectedResult.name}</p>
                    <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'0.6rem',fontSize:'0.8rem',color:'rgba(240,242,255,0.6)'}}>
                      <div><span style={{color:'rgba(240,242,255,0.35)',fontSize:'0.65rem',textTransform:'uppercase',letterSpacing:'0.1em'}}>Type</span><br/>{selectedResult.type}</div>
                      <div><span style={{color:'rgba(240,242,255,0.35)',fontSize:'0.65rem',textTransform:'uppercase',letterSpacing:'0.1em'}}>Address</span><br/>{selectedResult.address||'—'}</div>
                      <div><span style={{color:'rgba(240,242,255,0.35)',fontSize:'0.65rem',textTransform:'uppercase',letterSpacing:'0.1em'}}>Phone</span><br/>{selectedResult.phone||'—'}</div>
                      <div><span style={{color:'rgba(240,242,255,0.35)',fontSize:'0.65rem',textTransform:'uppercase',letterSpacing:'0.1em'}}>Website</span><br/>{selectedResult.website ? <a href={selectedResult.website} target="_blank" rel="noreferrer" style={{color:'#9D4EFF'}}>{selectedResult.website}</a> : '—'}</div>
                    </div>
                    <button className="btn btn-cyan btn-sm" style={{marginTop:'1rem'}} onClick={()=>useAsLead(selectedResult)}>
                      <ArrowRight size={12}/> Use as Lead in Part 2
                    </button>
                  </div>
                )}
              </div>
            </div>
          )}

          {/* ══════════════════════════════════
              PART 2 — OUTREACH SEQUENCES
          ══════════════════════════════════ */}
          {activeTab==='outreach' && (
            <div className="outreach-layout">
              {/* Left config */}
              <div>
                {outreachLead.name && (
                  <div className="lead-badge">
                    <Users size={15} className="lead-badge-ico"/>
                    <div className="lead-badge-text">
                      <span className="lead-badge-name">{outreachLead.name}</span>
                      {outreachLead.company && outreachLead.company!==outreachLead.name && <> — {outreachLead.company}</>}
                    </div>
                    <X size={13} style={{marginLeft:'auto',cursor:'pointer',opacity:0.4,flexShrink:0}} onClick={()=>setOutreachLead({name:'',company:'',email:''})}/>
                  </div>
                )}

                <div className="panel" style={{marginBottom:'1rem'}}>
                  <p className="panel-title"><Users size={15}/> Lead Info</p>
                  <span className="eyebrow">Lead Name / Business</span>
                  <input className="t-input" value={outreachLead.name} placeholder="e.g. Sarah Chen / Bloom Studio" onChange={e=>setOutreachLead(p=>({...p,name:e.target.value}))}/>
                  <div style={{marginTop:'0.7rem'}}>
                    <span className="eyebrow">Lead Email (optional)</span>
                    <input className="t-input" value={outreachLead.email} placeholder="sarah@bloomstudio.com" onChange={e=>setOutreachLead(p=>({...p,email:e.target.value}))}/>
                  </div>
                  <div className="divider"/>
                  <span className="eyebrow">Your Name</span>
                  <input className="t-input" value={yourName} placeholder="Your name" onChange={e=>setYourName(e.target.value)}/>
                  <div style={{marginTop:'0.7rem'}}>
                    <span className="eyebrow">What You're Offering</span>
                    <input className="t-input" value={yourService} placeholder="e.g. AI-powered social media content strategy" onChange={e=>setYourService(e.target.value)}/>
                  </div>
                </div>

                <div className="panel" style={{marginBottom:'1rem'}}>
                  <p className="panel-title"><Settings size={15}/> Sequence Config</p>

                  <span className="eyebrow">Sequence Type</span>
                  <select className="t-select" value={seqType} onChange={e=>setSeqType(e.target.value)}>
                    {['Cold Outreach','Warm Follow-up','Post-Meeting Follow-up','Proposal Follow-up','Re-engagement'].map(t=><option key={t}>{t}</option>)}
                  </select>

                  <div style={{marginTop:'0.75rem'}}>
                    <span className="eyebrow">Number of Messages</span>
                    <div className="num-row">
                      {[3,4,5,6,7,8].map(n=><div key={n} className={`num-btn${seqCount===n?' on':''}`} onClick={()=>setSeqCount(n)}>{n}</div>)}
                    </div>
                  </div>

                  <div style={{marginTop:'0.75rem'}}>
                    <span className="eyebrow">Tone</span>
                    <select className="t-select" value={seqTone} onChange={e=>setSeqTone(e.target.value)}>
                      {['Professional','Conversational','Direct','Friendly','Authoritative'].map(t=><option key={t}>{t}</option>)}
                    </select>
                  </div>

                  <div style={{marginTop:'0.75rem'}}>
                    <span className="eyebrow">Primary Goal</span>
                    <select className="t-select" value={seqGoal} onChange={e=>setSeqGoal(e.target.value)}>
                      {['Book a discovery call','Schedule a demo','Get a referral','Close the deal','Pitch a proposal'].map(g=><option key={g}>{g}</option>)}
                    </select>
                  </div>

                  <div className="divider"/>

                  <div className="toggle-row">
                    <span className="toggle-label">Include follow-up if no reply</span>
                    <div className={`toggle${includeFollowups?' on':''}`} onClick={()=>setFollowups(p=>!p)}><div className="toggle-dot"/></div>
                  </div>
                  <div className="toggle-row">
                    <span className="toggle-label">Include referral ask</span>
                    <div className={`toggle${includeReferral?' on':''}`} onClick={()=>setReferral(p=>!p)}><div className="toggle-dot"/></div>
                  </div>
                  {includeReferral && (
                    <div style={{marginTop:'0.5rem'}}>
                      <span className="eyebrow">Referral ask at message #</span>
                      <div className="num-row">
                        {[2,3,4,5].filter(n=>n<=seqCount).map(n=><div key={n} className={`num-btn${referralStep===n?' on':''}`} onClick={()=>setReferralStep(n)}>{n}</div>)}
                      </div>
                    </div>
                  )}
                </div>

                <button className={`btn btn-gen btn-full${seqPhase==='running'?' running':''}`}
                  disabled={seqPhase==='running'||!outreachLead.name.trim()}
                  onClick={generateSequence}>
                  {seqPhase==='running' ? <><Loader size={14} className="spin"/> Generating Sequence...</> : <><Zap size={14}/> Generate {seqCount}-Message Sequence</>}
                </button>

                {seqSteps.length > 0 && (
                  <div className="step-list" style={{marginTop:'0.85rem'}}>
                    {seqSteps.map(s=>(
                      <div key={s.id} className={`step-item${s.status==='active'?' active':s.status==='done'?' done':''}`}>
                        <div className="sdot"/><span className="slabel">{s.status==='done'?'✓ ':s.status==='active'?'⟳ ':''}{s.label}</span>
                      </div>
                    ))}
                  </div>
                )}
              </div>

              {/* Sequence output */}
              <div className="panel">
                {seqPhase==='idle' && (
                  <div className="seq-empty">
                    <Mail size={44} strokeWidth={1} color="#9D4EFF"/>
                    <p>Configure your sequence settings and generate a multi-message outreach campaign</p>
                  </div>
                )}
                {seqPhase==='running' && !sequence.length && (
                  <div className="seq-empty">
                    <Loader size={36} strokeWidth={1} color="#9D4EFF" className="spin"/>
                    <p>Writing your outreach sequence...</p>
                  </div>
                )}
                {sequence.length > 0 && (
                  <>
                    <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:'1.2rem',flexWrap:'wrap',gap:'0.5rem'}}>
                      <p style={{fontSize:'0.8rem',color:'rgba(240,242,255,0.55)'}}>{sequence.length} messages · {seqType} · {seqGoal}</p>
                      <button className="btn btn-ghost btn-sm" onClick={()=>copy(sequence.map(m=>`DAY ${m.day} — ${m.type}\nSubject: ${m.subject}\n\n${m.body}`).join('\n\n---\n\n'),'seq')}>
                        <Copy size={11}/> Copy All
                      </button>
                    </div>
                    <div className="gate-wrap">
                    <span className="gate-preview-badge">👁 Sample Preview — Day 1 message visible · Full sequence locked</span>
                    <div className="seq-list">
                      {(isUnlocked ? sequence : sequence.slice(0,1)).map((msg,i) => (
                        <div key={i} className="seq-card">
                          <div className="seq-card-head">
                            <div className="seq-day-badge">
                              <div className="seq-day-num">{msg.day}</div>
                              <div className="seq-day-lbl">day</div>
                            </div>
                            <div style={{flex:1,minWidth:0}}>
                              <p className="seq-subject">{msg.subject}</p>
                              <span className="seq-type-tag">{msg.type}</span>
                            </div>
                          </div>
                          <div className="seq-body-wrap">
                            <button className="seq-body-toggle" onClick={()=>setExpandedSeq(p=>({...p,[i]:!p[i]}))}>
                              <MessageSquare size={11}/>
                              {expandedSeq[i] ? 'Hide message' : 'View message'}
                              {expandedSeq[i] ? <ChevronUp size={11}/> : <ChevronDown size={11}/>}
                            </button>
                            {expandedSeq[i] && <div className="seq-body-content">{msg.body}</div>}
                          </div>
                          {(msg.responseIfPositive || msg.responseIfNegative) && (
                            <div className="seq-branch">
                              <p className="seq-branch-lbl"><Repeat size={10}/> Response Branches</p>
                              {msg.responseIfPositive && (
                                <div className="seq-branch-item">
                                  <p className="seq-branch-trigger">✅ If they reply with interest</p>
                                  <p className="seq-branch-text">{msg.responseIfPositive}</p>
                                </div>
                              )}
                              {msg.responseIfNoReply && (
                                <div className="seq-branch-item">
                                  <p className="seq-branch-trigger">⏰ If no reply</p>
                                  <p className="seq-branch-text">{msg.responseIfNoReply}</p>
                                </div>
                              )}
                              {msg.responseIfNegative && (
                                <div className="seq-branch-item">
                                  <p className="seq-branch-trigger">🚫 If they decline</p>
                                  <p className="seq-branch-text">{msg.responseIfNegative}</p>
                                </div>
                              )}
                            </div>
                          )}
                          <div className="seq-actions">
                            <button className="btn btn-ghost btn-sm" onClick={()=>copy(`Subject: ${msg.subject}\n\n${msg.body}`,`msg${i}`)}>
                              <Copy size={10}/> Copy Message
                            </button>
                          </div>
                        </div>
                      ))}
                    </div>
                  </>
                    {!isUnlocked && sequence.length > 1 && (
                      <div className="gate-blurred" style={{height:180,background:'rgba(7,10,32,0.4)',borderRadius:12,marginTop:'0.5rem'}}/>
                    )}
                    </div>
                    {!isUnlocked && sequence.length > 1 && <GateOverlay codeId="leadSeqCode"/>}
                    </div>
                )}
              </div>
            </div>
          )}

          {/* ══════════════════════════════════
              PART 3 — CONTRACT WRITER
          ══════════════════════════════════ */}
          {activeTab==='contract' && (
            <div className="contract-layout">
              {/* Left inputs */}
              <div>
                <div className="disclaimer-box">
                  <AlertCircle size={15}/>
                  <p><strong>AI-Generated Legal Document.</strong> This contract is generated for reference and a strong starting point. We recommend having a licensed attorney review before signing.</p>
                </div>

                <div className="panel" style={{marginBottom:'1rem'}}>
                  <p className="panel-title"><Users size={15}/> Parties</p>
                  <span className="eyebrow">Your Agency Name</span>
                  <input className="t-input" value={ci.agencyName} onChange={e=>setCI('agencyName',e.target.value)} placeholder="Toolzyo Studio (Haze)"/>
                  <div style={{marginTop:'0.7rem'}}>
                    <span className="eyebrow">Client Full Name *</span>
                    <input className="t-input" value={ci.clientName} onChange={e=>setCI('clientName',e.target.value)} placeholder="Client full legal name"/>
                  </div>
                  <div style={{marginTop:'0.7rem'}}>
                    <span className="eyebrow">Client Company</span>
                    <input className="t-input" value={ci.clientCompany} onChange={e=>setCI('clientCompany',e.target.value)} placeholder="Company name (if applicable)"/>
                  </div>
                </div>

                <div className="panel" style={{marginBottom:'1rem'}}>
                  <p className="panel-title"><Briefcase size={15}/> Service & Deliverables</p>
                  <span className="eyebrow">Service Type</span>
                  <select className="t-select" value={ci.serviceType} onChange={e=>setCI('serviceType',e.target.value)}>
                    {['Social Media Management','Content Creation','AI Tools Consulting','Marketing Strategy','Brand Identity & Design','Custom Web Development','Podcast Production','Video Production','SEO & Growth Strategy','Monthly Retainer — Full Services'].map(s=><option key={s}>{s}</option>)}
                  </select>
                  <div style={{marginTop:'0.7rem'}}>
                    <span className="eyebrow">Deliverables (be specific) *</span>
                    <textarea className="t-input" rows={4} value={ci.deliverables} onChange={e=>setCI('deliverables',e.target.value)} placeholder="e.g. 12 Instagram posts/month, 4 Reels, monthly analytics report, caption writing, scheduling..."/>
                  </div>
                </div>

                <div className="panel" style={{marginBottom:'1rem'}}>
                  <p className="panel-title"><Hash size={15}/> Pricing & Timeline</p>
                  <div className="input-row">
                    <div>
                      <span className="eyebrow">Total Price / Rate</span>
                      <input className="t-input" value={ci.price} onChange={e=>setCI('price',e.target.value)} placeholder="$1,500/month"/>
                    </div>
                    <div>
                      <span className="eyebrow">Payment Schedule</span>
                      <select className="t-select" value={ci.paymentSchedule} onChange={e=>setCI('paymentSchedule',e.target.value)}>
                        {['100% upfront','50% upfront, 50% on completion','Monthly on the 1st','Net 15','Net 30','Milestone-based'].map(s=><option key={s}>{s}</option>)}
                      </select>
                    </div>
                  </div>
                  <div className="input-row" style={{marginTop:'0.7rem'}}>
                    <div>
                      <span className="eyebrow">Start Date</span>
                      <input className="t-input" type="date" value={ci.startDate} onChange={e=>setCI('startDate',e.target.value)}/>
                    </div>
                    <div>
                      <span className="eyebrow">Duration</span>
                      <input className="t-input" value={ci.duration} onChange={e=>setCI('duration',e.target.value)} placeholder="30 days / 3 months"/>
                    </div>
                  </div>
                </div>

                <div className="panel" style={{marginBottom:'1rem'}}>
                  <p className="panel-title"><Shield size={15}/> Terms & Protections</p>
                  <div className="input-row">
                    <div>
                      <span className="eyebrow">Revisions Included</span>
                      <select className="t-select" value={ci.revisions} onChange={e=>setCI('revisions',e.target.value)}>
                        {['1','2','3','Unlimited'].map(n=><option key={n}>{n}</option>)}
                      </select>
                    </div>
                    <div>
                      <span className="eyebrow">Kill Fee %</span>
                      <select className="t-select" value={ci.killFee} onChange={e=>setCI('killFee',e.target.value)}>
                        {['10','15','20','25','30','50'].map(n=><option key={n}>{n}%</option>)}
                      </select>
                    </div>
                  </div>
                  <div style={{marginTop:'0.7rem'}}>
                    <span className="eyebrow">Governing Law</span>
                    <input className="t-input" value={ci.governingLaw} onChange={e=>setCI('governingLaw',e.target.value)} placeholder="State of Florida, USA"/>
                  </div>
                  <div className="divider"/>
                  <div className="toggle-row">
                    <span className="toggle-label">Include Confidentiality / NDA clause</span>
                    <div className={`toggle${ci.hasNDA?' on':''}`} onClick={()=>setCI('hasNDA',!ci.hasNDA)}><div className="toggle-dot"/></div>
                  </div>
                  <div className="toggle-row">
                    <span className="toggle-label">Transfer IP to client on full payment</span>
                    <div className={`toggle${ci.ipTransfer?' on':''}`} onClick={()=>setCI('ipTransfer',!ci.ipTransfer)}><div className="toggle-dot"/></div>
                  </div>
                  <div style={{marginTop:'0.75rem'}}>
                    <span className="eyebrow">Additional Terms / Special Clauses</span>
                    <textarea className="t-input" rows={3} value={ci.additionalTerms} onChange={e=>setCI('additionalTerms',e.target.value)} placeholder="Any special terms, exclusions, or notes..."/>
                  </div>
                </div>

                <button className={`btn btn-gen btn-full${contractPhase==='running'?' running':''}`}
                  disabled={contractPhase==='running'||!ci.clientName.trim()||!ci.deliverables.trim()}
                  onClick={generateContract}>
                  {contractPhase==='running' ? <><Loader size={14} className="spin"/> Drafting Contract...</> : <><Shield size={14}/> Generate Contract</>}
                </button>

                {contractSteps.length > 0 && (
                  <div className="step-list" style={{marginTop:'0.85rem'}}>
                    {contractSteps.map(s=>(
                      <div key={s.id} className={`step-item${s.status==='active'?' active':s.status==='done'?' done':''}`}>
                        <div className="sdot"/><span className="slabel">{s.status==='done'?'✓ ':s.status==='active'?'⟳ ':''}{s.label}</span>
                      </div>
                    ))}
                  </div>
                )}
              </div>

              {/* Contract preview */}
              <div className="panel" style={{minHeight:600}}>
                {contractPhase==='idle' && (
                  <div className="contract-empty">
                    <Shield size={44} strokeWidth={1} color="#9D4EFF"/>
                    <p>Fill in the contract details and generate a professional, legally-protective service agreement</p>
                  </div>
                )}
                {contractPhase==='running' && !contractHTML && (
                  <div className="contract-empty">
                    <Loader size={36} strokeWidth={1} color="#9D4EFF" className="spin"/>
                    <p>Drafting your contract with comprehensive legal protections...</p>
                  </div>
                )}
                {contractHTML && (
                  <div className="gate-wrap">
                    <span className="gate-preview-badge">👁 Sample Preview — First clause visible · Full contract locked</span>
                  <>
                    <div style={{display:'flex',gap:'0.6rem',marginBottom:'1.2rem',flexWrap:'wrap'}}>
                      <button className="btn btn-cyan btn-sm" onClick={()=>gatedDownload(downloadContract)}><Download size={11}/> Download HTML</button>
                      <button className="btn btn-ghost btn-sm" onClick={()=>copy(contractHTML,'contract')}><Copy size={11}/> Copy HTML</button>
                      <button className="btn btn-ghost btn-sm" onClick={()=>window.open('about:blank').document.write(contractHTML)}><FileText size={11}/> Preview</button>
                    </div>
                    <div className="disclaimer-box" style={{marginBottom:'1.2rem'}}>
                      <AlertCircle size={14}/>
                      <p><strong>Review before use.</strong> AI-generated contracts are a strong starting point. Have a licensed attorney in your jurisdiction review before client signature.</p>
                    </div>
                    <div className="contract-preview"
                      dangerouslySetInnerHTML={{__html: contractHTML
                        .replace(/<html[\s\S]*?<body[^>]*>/i,'')
                        .replace(/<\/body>[\s\S]*?<\/html>/i,'')
                        .replace(/<style[\s\S]*?<\/style>/gi,'')
                        .replace(/<script[\s\S]*?<\/script>/gi,'')
                        .replace(/<link[^>]*>/gi,'')
                      }}
                    />
                  </>
                )}
              </div>
            </div>
          )}
        </div>
      </div>
      {toast && <div className="toast"><Check size={13}/> {toast}</div>}

      {showPaywall && (
        <div className="pw-overlay" onClick={e=>{ if(e.target===e.currentTarget){ setShowPaywall(false); } }}>
          <div className="pw-card">
            <div className="pw-lock">🔒</div>
            <h2 className="pw-title">Your results are ready to save</h2>
            <p className="pw-sub">Generate freely — download your personalized output when you're on a package or grab one-time access.</p>
            <div className="pw-options">
              <button className="pw-opt pw-opt-primary" onClick={()=>{ setShowPaywall(false); window.open('https://toolzyo.com/#pricing','_blank'); }}>
                <div className="pw-opt-label">📦 View Packages</div>
                <div className="pw-opt-text">Content Engine · Full Service · Strategy Snapshot</div>
                <div className="pw-opt-price">From $397 · Includes unlimited downloads</div>
              </button>
              <button className="pw-opt pw-opt-secondary" onClick={()=>{ setShowPaywall(false); window.open('https://toolzyo.com/vault','_blank'); }}>
                <div className="pw-opt-label">⚡ One-Time Download</div>
                <div className="pw-opt-text">Pay once, download this result now</div>
                <div className="pw-opt-price">$9 per export — available in The Vault</div>
              </button>
            </div>
            <div className="pw-divider"/>
            <p className="pw-code-lbl">Already have access? Enter your code</p>
            <div className="pw-code-row">
              <input className="pw-code-input" id="pwCodeInput" placeholder="Access code" type="text" onKeyDown={e=>e.key==='Enter'&&unlockWithCode('pwCodeInput')}/>
              <button className="pw-code-btn" onClick={()=>unlockWithCode('pwCodeInput')}>Unlock</button>
            </div>
            <button className="pw-dismiss" onClick={()=>setShowPaywall(false)}>Continue browsing without downloading</button>
          </div>
        </div>
      )}

    </>
  );
}


const container = document.getElementById('root');
const root = ReactDOM.createRoot(container);
root.render(React.createElement(ToolzyoLeadEngine));
</script>
</body>
</html>
