function parseScript(raw) {
  // Try to extract labeled sections
  const sections = [];
  const sectionRe = /\[([^\]]+)\]\s*\n([\s\S]*?)(?=\n\[|$)/g;
  let match;
  let hasSections = false;
  while ((match = sectionRe.exec(raw)) !== null) {
    sections.push({ label: match[1], text: match[2].trim() });
    hasSections = true;
  }
  if (hasSections) return sections;
  // Fallback: paragraph split
  const paras = raw.split(/\n{2,}/);
  return paras.map((p, i) => ({ label: i === 0 ? 'Intro' : i === paras.length - 1 ? 'Outro' : `Segment ${i}`, text: p.trim() }));
}

                      <div className="script-actions">
                        <button className="btn btn-ghost btn-sm" onClick={copyScript}>
                          {copyDone ? <><Check size={12} /> Copied</> : <><Copy size={12} /> Copy</>}
                        </button>
                        <button className="btn btn-ghost btn-sm" onClick={()=>gatedDownload(downloadScript)}>
                          <Download size={12} /> .txt
                        </button>
                      </div>
                    </div>

                    {/* Word count stats */}
                    <div className="wc-row">
                      <div className="wc-item">
                        <div className="wc-num">{wordCount.toLocaleString()}</div>
                        <div className="wc-label">Words</div>
                      </div>
                      <div className="wc-item">
                        <div className="wc-num">{estimatedMins}</div>
                        <div className="wc-label">Est. Minutes</div>
                      </div>
                      <div className="wc-item">
                        <div className="wc-num">{scriptSections.length}</div>
                        <div className="wc-label">Sections</div>
                      </div>
                    </div>

                    <div className="divider" />

                    {/* Script sections — show first section, blur rest */}
                    <div className="script-body">
                      {scriptSections.slice(0,1).map((s, i) => (
                        <div key={i} className="script-section">
                          <div className="script-section-label">{s.label}</div>
                          <div className="script-text">{s.text}</div>
                        </div>
                      ))}
                    </div>

                    {!isUnlocked && (
                      <div className="gate-blurred">
                        {scriptSections.slice(1).map((s, i) => (
                          <div key={i} className="script-section">
                            <div className="script-section-label">{s.label}</div>
                            <div className="script-text">{s.text}</div>
                          </div>
                        ))}
                      </div>
                    )}
                    {isUnlocked && scriptSections.slice(1).map((s, i) => (
                      <div key={i} className="script-section">
                        <div className="script-section-label">{s.label}</div>
                        <div className="script-text">{s.text}</div>
                      </div>
                    ))}

                    {/* Transcript download */}
                    {phase === 'done' && (
                      <>
                        <div className="transcript-card">
                          <div className="transcript-title"><FileText size={13} /> Formatted Transcript Page</div>
                          <p className="transcript-desc">Download a branded HTML transcript page — ready to share with clients, post on your site, or hand off to a voice actor.</p>
                          <button className="btn btn-cyan btn-sm" style={{marginTop:'0.8rem', width:'100%'}} onClick={()=>gatedDownload(downloadTranscript)}>
                            <Download size={13} /> Download Transcript Page (.html)
                          </button>
                        </div>

                        {/* Upsell */}
                        <div className="upsell-card">
                          <div className="upsell-title">Want a <span>professional voiceover?</span></div>
                          <p className="upsell-desc">Toolzyo Studio offers AI-enhanced voiceover production as a premium add-on. Lifelike voice, mixed audio, ready to publish.</p>
                          <div className="upsell-price">+$49 <span>/ episode add-on</span></div>
                        </div>
                      </>
                    )}
                  </div>
                  {!isUnlocked && <GateOverlay codeId="podcastCode"/>}
                  </div>
                )}
              </div>

              {/* Research Brief (collapsible) */}
              {researchSummary && (
                <div className="panel">
                  <p className="panel-title"><BookOpen size={16} /> Research Brief</p>
                  <p style={{fontSize:'0.83rem', lineHeight:'1.8', color:'rgba(240,242,255,0.65)', whiteSpace:'pre-wrap'}}>{researchSummary}</p>
                </div>
              )}
            </div>

          </div>
        </div>
      </div>

      {copyDone && (
        <div className="copy-toast"><Check size={14} /> Script copied to clipboard</div>
      )}

      {showPaywall && (
        <div className="pw-overlay" onClick={e=>{ if(e.target===e.currentTarget){ setShowPaywall(false); } }}>
          <div className="pw-card">
            <div className="pw-lock">🔒</div>
            <h2 className="pw-title">Your results are ready to save</h2>
            <p className="pw-sub">Generate freely — download your personalized output when you're on a package or grab one-time access.</p>
            <div className="pw-options">
              <button className="pw-opt pw-opt-primary" onClick={()=>{ setShowPaywall(false); window.open('https://toolzyo.com/#pricing','_blank'); }}>
                <div className="pw-opt-label">📦 View Packages</div>
                <div className="pw-opt-text">Content Engine · Full Service · Strategy Snapshot</div>
                <div className="pw-opt-price">From $397 · Includes unlimited downloads</div>
              </button>
              <button className="pw-opt pw-opt-secondary" onClick={()=>{ setShowPaywall(false); window.open('https://toolzyo.com/vault','_blank'); }}>
                <div className="pw-opt-label">⚡ One-Time Download</div>
                <div className="pw-opt-text">Pay once, download this result now</div>
                <div className="pw-opt-price">$9 per export — available in The Vault</div>
              </button>
            </div>
            <div className="pw-divider"/>
            <p className="pw-code-lbl">Already have access? Enter your code</p>
            <div className="pw-code-row">
              <input className="pw-code-input" id="pwCodeInput" placeholder="Access code" type="text" onKeyDown={e=>e.key==='Enter'&&unlockWithCode('pwCodeInput')}/>
              <button className="pw-code-btn" onClick={()=>unlockWithCode('pwCodeInput')}>Unlock</button>
            </div>
            <button className="pw-dismiss" onClick={()=>setShowPaywall(false)}>Continue browsing without downloading</button>
          </div>
        </div>
      )}

    </>
  );
}


const container = document.getElementById('root');
const root = ReactDOM.createRoot(container);
root.render(React.createElement(ToolzyoPodcastStudio));
</script>
</body>
</html>
