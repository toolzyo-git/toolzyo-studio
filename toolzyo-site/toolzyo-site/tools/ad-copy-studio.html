function download(content, filename) {

            </div>

            {/* ── RIGHT ── */}
            <div className="panel" style={{minHeight:520}}>
              {phase==='idle' && (
                <div className="out-empty">
                  <Megaphone size={44} strokeWidth={1} color="#9D4EFF"/>
                  <p>Fill in your campaign brief and generate a full ad strategy with 5 ads per platform</p>
                </div>
              )}
              {isRunning && !result && (
                <div className="out-empty">
                  <Loader size={36} strokeWidth={1} color="#9D4EFF" className="spin"/>
                  <p>Building your ad strategy and writing copy...</p>
                </div>
              )}
              {phase==='error' && (
                <div className="out-empty">
                  <AlertCircle size={34} color="#ff8080"/>
                  <p style={{color:'#ff8080'}}>Something went wrong. Try again.</p>
                </div>
              )}

              {result && (
                <div className="gate-wrap">
                  <span className="gate-preview-badge">👁 Sample Preview — Strategy + Ad 1 per platform visible · Ads 2–5 + image prompts locked</span>

                  {/* STRATEGY — always visible */}
                  <div style={{marginBottom:'1.5rem'}}>
                    <p style={{fontFamily:"'Gambarino',Georgia,serif",fontSize:'1.1rem',marginBottom:'0.85rem',display:'flex',alignItems:'center',gap:'0.5rem'}}>
                      <BarChart2 size={16} color="#9D4EFF"/> Campaign Strategy
                    </p>
                    <div className="strategy-box">
                      <p className="strategy-box-title"><Target size={12}/> Ad Strategy Overview</p>
                      <div className="strategy-field">
                        <p className="strategy-label">Overview</p>
                        <p className="strategy-value">{result.strategy.overview}</p>
                      </div>
                      <div className="strategy-field">
                        <p className="strategy-label">Audience Insight</p>
                        <p className="strategy-value">{result.strategy.audienceInsight}</p>
                      </div>
                      <div className="strategy-field">
                        <p className="strategy-label">Messaging Approach</p>
                        <p className="strategy-value">{result.strategy.messagingApproach}</p>
                      </div>
                      <div className="strategy-field">
                        <p className="strategy-label">Budget Split</p>
                        <p className="strategy-value">{result.strategy.budgetSplit}</p>
                      </div>
                      <div className="strategy-field">
                        <p className="strategy-label">Test First</p>
                        <p className="strategy-value">{result.strategy.testingPriority}</p>
                      </div>
                      {result.strategy.audienceTargeting?.length > 0 && (
                        <div className="strategy-field">
                          <p className="strategy-label">Targeting Suggestions</p>
                          <div className="strategy-pills">
                            {result.strategy.audienceTargeting.map((t,i)=>(
                              <span key={i} className="strategy-pill">{t}</span>
                            ))}
                          </div>
                        </div>
                      )}
                    </div>

                    {isUnlocked && (
                      <div style={{display:'flex',gap:'0.6rem',marginBottom:'1.2rem',flexWrap:'wrap'}}>
                        <button className="btn btn-cyan btn-sm" onClick={exportReport}><Download size={11}/> Export Full Report</button>
                        <button className="btn btn-ghost btn-sm" onClick={()=>copy(JSON.stringify(result,null,2),'json')}>{copied==='json'?<Check size={10}/>:<Copy size={10}/>} Copy JSON</button>
                      </div>
                    )}
                  </div>

                  {/* ADS PER PLATFORM */}
                  {(result.platforms||[]).map((plat,pi) => (
                    <div key={pi} className="plat-section">
                      <div className={`plat-section-header${expanded[plat.platform]?' open':''}`}
                        onClick={()=>toggleExp(plat.platform)}>
                        <span className="plat-section-title">
                          <span style={{fontSize:'1.3rem'}}>{plat.platformIcon}</span>
                          {plat.platform}
                          <span style={{fontSize:'0.7rem',color:'rgba(240,242,255,0.38)',fontFamily:"'Switzer',sans-serif",fontWeight:300}}>{plat.adFormat}</span>
                        </span>
                        {expanded[plat.platform] ? <ChevronUp size={15} color="#9D4EFF"/> : <ChevronDown size={15} color="#9D4EFF"/>}
                      </div>

                      {expanded[plat.platform] && (
                        <div className="plat-section-body">
                          <p style={{fontSize:'0.77rem',color:'rgba(240,242,255,0.45)',marginBottom:'0.6rem',lineHeight:1.65,fontStyle:'italic'}}>{plat.strategicNote}</p>
                          <p style={{fontSize:'0.65rem',color:'rgba(240,242,255,0.28)',marginBottom:'1rem',letterSpacing:'0.08em'}}>{plat.specs}</p>

                          <div className="ads-list">
                            {/* Ad 1 — always visible */}
                            {(plat.ads||[]).slice(0,1).map((ad,ai) => (
                              <div key={ai} className="ad-card">
                                <div className="ad-card-head">
                                  <div style={{display:'flex',alignItems:'center',gap:'0.4rem'}}>
                                    <span className="ad-num-badge">Ad {ad.num}</span>
                                    <span className={`ad-angle-tag ad-angle-${(ANGLE_CLASS[ad.angle]||'curiosity')}`}>{ad.angle}</span>
                                    <span style={{fontSize:'0.68rem',color:'rgba(240,242,255,0.3)'}}>{ad.adType}</span>
                                  </div>
                                  <button className="btn btn-ghost btn-sm" onClick={()=>copy(`${ad.headline}\n\n${ad.primaryText}\n\nCTA: ${ad.cta}`,`ad${pi}_${ai}`)}>
                                    {copied===`ad${pi}_${ai}`?<Check size={10}/>:<Copy size={10}/>}
                                  </button>
                                </div>
                                <div className="ad-body">
                                  <div className="ad-field">
                                    <p className="ad-field-label">Headline</p>
                                    <p className="ad-headline">{ad.headline}</p>
                                  </div>
                                  <div className="ad-field">
                                    <p className="ad-field-label">Primary Text / Body</p>
                                    <p className="ad-body-text">{ad.primaryText}</p>
                                  </div>
                                  <div className="ad-field">
                                    <p className="ad-field-label">CTA</p>
                                    <span className="ad-cta-badge">{ad.cta}</span>
                                  </div>
                                  {ad.whyItWorks && (
                                    <p style={{fontSize:'0.72rem',color:'rgba(240,242,255,0.35)',marginTop:'0.6rem',fontStyle:'italic',lineHeight:1.6}}>{ad.whyItWorks}</p>
                                  )}
                                </div>
                              </div>
                            ))}

                            {/* Ads 2–5 + image prompt — gated */}
                            {!isUnlocked && (plat.ads||[]).length > 1 && (
                              <div className="gate-blurred">
                                {(plat.ads||[]).slice(1).map((ad,ai)=>(
                                  <div key={ai} className="ad-card">
                                    <div className="ad-card-head">
                                      <span className="ad-num-badge">Ad {ad.num}</span>
                                      <span className={`ad-angle-tag ad-angle-${(ANGLE_CLASS[ad.angle]||'curiosity')}`}>{ad.angle}</span>
                                    </div>
                                    <div className="ad-body">
                                      <p className="ad-headline">{ad.headline}</p>
                                      <p className="ad-body-text">{ad.primaryText}</p>
                                    </div>
                                  </div>
                                ))}
                                {plat.imagePrompt && (
                                  <div className="img-prompt-box">
                                    <p className="img-prompt-label">🎨 Image Prompt</p>
                                    <p className="img-prompt-text">{plat.imagePrompt}</p>
                                  </div>
                                )}
                              </div>
                            )}

                            {isUnlocked && (plat.ads||[]).slice(1).map((ad,ai)=>(
                              <div key={ai+1} className="ad-card">
                                <div className="ad-card-head">
                                  <div style={{display:'flex',alignItems:'center',gap:'0.4rem'}}>
                                    <span className="ad-num-badge">Ad {ad.num}</span>
                                    <span className={`ad-angle-tag ad-angle-${(ANGLE_CLASS[ad.angle]||'curiosity')}`}>{ad.angle}</span>
                                    <span style={{fontSize:'0.68rem',color:'rgba(240,242,255,0.3)'}}>{ad.adType}</span>
                                  </div>
                                  <button className="btn btn-ghost btn-sm" onClick={()=>copy(`${ad.headline}\n\n${ad.primaryText}\n\nCTA: ${ad.cta}`,`ad${pi}_${ai+1}`)}>
                                    {copied===`ad${pi}_${ai+1}`?<Check size={10}/>:<Copy size={10}/>}
                                  </button>
                                </div>
                                <div className="ad-body">
                                  <div className="ad-field">
                                    <p className="ad-field-label">Headline</p>
                                    <p className="ad-headline">{ad.headline}</p>
                                  </div>
                                  <div className="ad-field">
                                    <p className="ad-field-label">Primary Text / Body</p>
                                    <p className="ad-body-text">{ad.primaryText}</p>
                                  </div>
                                  <div className="ad-field">
                                    <p className="ad-field-label">CTA</p>
                                    <span className="ad-cta-badge">{ad.cta}</span>
                                  </div>
                                  {ad.whyItWorks && (
                                    <p style={{fontSize:'0.72rem',color:'rgba(240,242,255,0.35)',marginTop:'0.6rem',fontStyle:'italic',lineHeight:1.6}}>{ad.whyItWorks}</p>
                                  )}
                                </div>
                              </div>
                            ))}

                            {isUnlocked && plat.imagePrompt && (
                              <div className="img-prompt-box">
                                <div className="img-prompt-header">
                                  <span className="img-prompt-label">🎨 Image Generation Prompt</span>
                                  <div className="img-model-tags">
                                    <span className="img-model-tag">Midjourney</span>
                                    <span className="img-model-tag">Leonardo AI</span>
                                    <span className="img-model-tag">Flux</span>
                                    <span className="img-model-tag">Grok</span>
                                  </div>
                                </div>
                                <p className="img-prompt-text">{plat.imagePrompt}</p>
                                <button className="btn btn-ghost btn-sm" onClick={()=>copy(plat.imagePrompt,`img${pi}`)}>
                                  {copied===`img${pi}`?<Check size={10}/>:<Copy size={10}/>} Copy Prompt
                                </button>
                              </div>
                            )}
                          </div>
                        </div>
                      )}
                    </div>
                  ))}

                  {!isUnlocked && <GateOverlay codeId="adCopyCode"/>}
                </div>
              )}
            </div>
          </div>
        </div>
      </div>
      {toast && <div className="toast"><Check size={13}/> {toast}</div>}
    </>
  );
}


const container = document.getElementById('root');
const root = ReactDOM.createRoot(container);
root.render(React.createElement(ToolzyoAdCopyStudio));
</script>
</body>
</html>
