<script type="text/babel" data-presets="react">

const css = `
  @import url('https://fonts.cdnfonts.com/css/gambarino');
  @import url('https://fonts.cdnfonts.com/css/switzer');

  .sp-root *, .sp-root *::before, .sp-root *::after { box-sizing:border-box; margin:0; padding:0; }
  .sp-root {
    font-family:'Switzer','DM Sans',sans-serif;
    background:#070A20; color:#F0F2FF;
    min-height:100vh; overflow-x:hidden; position:relative;
  }
  .sp-root::before {
    content:''; position:fixed; inset:0; pointer-events:none; z-index:0;
    background:
      radial-gradient(ellipse 60% 50% at 3% 8%,   rgba(42,47,255,0.16) 0%, transparent 60%),
      radial-gradient(ellipse 50% 45% at 97% 92%, rgba(196,0,255,0.11) 0%, transparent 60%),
      radial-gradient(ellipse 35% 30% at 55% 45%, rgba(0,232,192,0.05) 0%, transparent 55%);
  }
  .sp-inner { position:relative; z-index:1; max-width:1340px; margin:0 auto; padding:2rem 2rem 5rem; }

  /* HEADER */
  .sp-header { text-align:center; padding:2.5rem 0 3rem; }
  .sp-wordmark { font-family:'Gambarino',Georgia,serif; font-size:1.15rem; color:rgba(240,242,255,0.4); letter-spacing:0.04em; margin-bottom:1.2rem; }
  .sp-wordmark em { font-style:normal; color:#9D4EFF; }
  .sp-title { font-family:'Gambarino',Georgia,serif; font-size:clamp(2.4rem,5vw,4.8rem); line-height:0.92; }
  .sp-grd { background:linear-gradient(135deg,#2A2FFF,#9D4EFF,#C400FF); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
  .sp-sub { font-weight:300; font-size:0.93rem; color:rgba(240,242,255,0.5); margin-top:0.9rem; line-height:1.7; }
  .sp-chips { display:flex; gap:0.5rem; justify-content:center; flex-wrap:wrap; margin-top:1.1rem; }
  .chip { display:inline-flex; align-items:center; gap:0.3rem; padding:0.24rem 0.78rem; border-radius:50px; font-size:0.66rem; letter-spacing:0.1em; text-transform:uppercase; }
  .cb { background:rgba(42,47,255,0.12); border:1px solid rgba(42,47,255,0.28); color:#8b91ff; }
  .cp { background:rgba(123,43,255,0.12); border:1px solid rgba(123,43,255,0.28); color:#c084fc; }
  .cc { background:rgba(0,232,192,0.09); border:1px solid rgba(0,232,192,0.24); color:#00E8C0; }
  .cm { background:rgba(196,0,255,0.1); border:1px solid rgba(196,0,255,0.25); color:#e879f9; }
  .cy { background:rgba(255,200,0,0.1); border:1px solid rgba(255,200,0,0.25); color:#fbbf24; }

  /* LAYOUT */
  .sp-layout { display:grid; grid-template-columns:360px 1fr; gap:1.6rem; align-items:start; }
  @media(max-width:1020px){ .sp-layout{ grid-template-columns:1fr; } }

  /* PANEL */
  .panel { background:rgba(13,16,53,0.82); border:1px solid rgba(123,43,255,0.2); border-radius:20px; padding:1.75rem; backdrop-filter:blur(16px); position:relative; overflow:hidden; margin-bottom:1.2rem; }
  .panel::before { content:''; position:absolute; top:0; left:0; right:0; height:1px; background:linear-gradient(90deg,transparent,rgba(157,78,255,0.5),transparent); }
  .panel-title { font-family:'Gambarino',Georgia,serif; font-size:1.05rem; letter-spacing:0.02em; margin-bottom:1.2rem; display:flex; align-items:center; gap:0.5rem; }
  .panel-title svg { color:#9D4EFF; }
  .eyebrow { font-size:0.66rem; font-weight:400; letter-spacing:0.16em; text-transform:uppercase; color:#9D4EFF; margin-bottom:0.5rem; display:block; }
  .divider { height:1px; background:rgba(123,43,255,0.14); margin:1rem 0; }

  /* INPUTS */
  .t-input { width:100%; background:rgba(7,10,32,0.8); border:1px solid rgba(123,43,255,0.22); border-radius:11px; padding:0.72rem 1rem; font-family:'Switzer',sans-serif; font-size:0.83rem; color:#F0F2FF; outline:none; resize:none; transition:border-color 0.2s; line-height:1.65; }
  .t-input:focus { border-color:#9D4EFF; }
  .t-input::placeholder { color:rgba(240,242,255,0.2); }

  /* TOPIC TAGS */
  .topic-input-row { display:flex; gap:0.5rem; }
  .topic-input-row input { flex:1; }
  .add-topic-btn { background:rgba(123,43,255,0.15); border:1px solid rgba(123,43,255,0.3); border-radius:9px; padding:0 0.9rem; color:#9D4EFF; cursor:pointer; font-size:1.1rem; transition:all 0.2s; display:flex; align-items:center; }
  .add-topic-btn:hover { background:rgba(123,43,255,0.25); }
  .topic-tags { display:flex; flex-wrap:wrap; gap:0.4rem; margin-top:0.65rem; }
  .topic-tag { display:inline-flex; align-items:center; gap:0.35rem; background:rgba(123,43,255,0.15); border:1px solid rgba(123,43,255,0.28); border-radius:50px; padding:0.22rem 0.7rem; font-size:0.72rem; color:#c084fc; }
  .topic-tag-x { cursor:pointer; opacity:0.5; transition:opacity 0.15s; display:flex; align-items:center; }
  .topic-tag-x:hover { opacity:1; }

  /* PILL GRID */
  .pill-row { display:flex; flex-wrap:wrap; gap:0.38rem; }
  .pill { background:rgba(255,255,255,0.04); border:1px solid rgba(123,43,255,0.16); border-radius:50px; padding:0.24rem 0.7rem; font-size:0.7rem; color:rgba(240,242,255,0.5); cursor:pointer; transition:all 0.18s; }
  .pill:hover { border-color:#9D4EFF; color:#F0F2FF; }
  .pill.on { background:rgba(123,43,255,0.18); border-color:#9D4EFF; color:#F0F2FF; }

  /* PLATFORM GRID */
  .plat-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:0.42rem; }
  .plat { background:rgba(7,10,32,0.6); border:1px solid rgba(123,43,255,0.14); border-radius:10px; padding:0.58rem 0.45rem; text-align:center; cursor:pointer; transition:all 0.2s; font-size:0.7rem; color:rgba(240,242,255,0.48); }
  .plat:hover { border-color:rgba(123,43,255,0.38); }
  .plat.on { background:rgba(123,43,255,0.15); border-color:#9D4EFF; color:#F0F2FF; }
  .plat-ico { font-size:1.15rem; display:block; margin-bottom:0.18rem; }

  /* COUNT SELECTOR */
  .count-btns { display:flex; gap:0.42rem; }
  .count-btn { flex:1; padding:0.55rem; border-radius:9px; border:1px solid rgba(123,43,255,0.18); background:rgba(7,10,32,0.6); cursor:pointer; text-align:center; font-size:0.8rem; color:rgba(240,242,255,0.5); transition:all 0.2s; font-family:'Switzer',sans-serif; }
  .count-btn:hover { border-color:rgba(123,43,255,0.38); color:#F0F2FF; }
  .count-btn.on { background:rgba(123,43,255,0.15); border-color:#9D4EFF; color:#F0F2FF; }

  /* BUTTONS */
  .btn { border:none; cursor:pointer; font-family:'Switzer',sans-serif; font-weight:500; font-size:0.82rem; letter-spacing:0.08em; text-transform:uppercase; border-radius:50px; padding:0.8rem 1.8rem; transition:all 0.22s; display:inline-flex; align-items:center; gap:0.5rem; justify-content:center; }
  .btn:disabled { opacity:0.35; cursor:not-allowed; }
  .btn-gen { background:linear-gradient(135deg,#2A2FFF,#7B2BFF,#C400FF); background-size:200% 200%; color:#F0F2FF; width:100%; padding:1rem; font-size:0.88rem; }
  .btn-gen:hover:not(:disabled) { transform:translateY(-2px); box-shadow:0 16px 42px rgba(123,43,255,0.5); }
  .btn-gen.running { animation:gradpulse 2s linear infinite; }
  .btn-ghost { background:transparent; border:1px solid rgba(123,43,255,0.32); color:#9D4EFF; }
  .btn-ghost:hover:not(:disabled) { background:rgba(123,43,255,0.1); border-color:#9D4EFF; color:#F0F2FF; }
  .btn-cyan { background:rgba(0,232,192,0.1); border:1px solid rgba(0,232,192,0.28); color:#00E8C0; }
  .btn-cyan:hover:not(:disabled) { background:rgba(0,232,192,0.18); }
  .btn-sm { padding:0.38rem 0.95rem; font-size:0.7rem; }
  @keyframes gradpulse { 0%{background-position:0% 50%} 50%{background-position:100% 50%} 100%{background-position:0% 50%} }
  @keyframes spin { to{transform:rotate(360deg)} }
  .spin { animation:spin 0.8s linear infinite; }

  /* PROGRESS */
  .step-list { display:flex; flex-direction:column; gap:0.42rem; margin:1rem 0; }
  .step-item { display:flex; align-items:center; gap:0.65rem; padding:0.55rem 0.8rem; border-radius:9px; background:rgba(7,10,32,0.6); border:1px solid rgba(123,43,255,0.1); transition:all 0.3s; }
  .step-item.active { border-color:rgba(157,78,255,0.38); background:rgba(123,43,255,0.1); }
  .step-item.done { border-color:rgba(0,232,192,0.25); background:rgba(0,232,192,0.05); }
  .sdot { width:7px; height:7px; border-radius:50%; background:rgba(123,43,255,0.22); flex-shrink:0; }
  .step-item.active .sdot { background:#9D4EFF; box-shadow:0 0 8px rgba(157,78,255,0.7); animation:dpulse 1s infinite; }
  .step-item.done .sdot { background:#00E8C0; }
  .slabel { font-size:0.75rem; color:rgba(240,242,255,0.42); }
  .step-item.active .slabel { color:#F0F2FF; }
  .step-item.done .slabel { color:rgba(0,232,192,0.72); }
  @keyframes dpulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.5;transform:scale(1.3)} }

  /* EMPTY */
  .out-empty { min-height:500px; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:0.75rem; opacity:0.38; }
  .out-empty p { font-size:0.83rem; color:rgba(240,242,255,0.5); text-align:center; max-width:260px; line-height:1.65; }

  /* STATS BAR */
  .stats-bar { display:flex; gap:0.7rem; flex-wrap:wrap; margin-bottom:1.3rem; }
  .stat-pill { display:inline-flex; align-items:center; gap:0.35rem; padding:0.3rem 0.85rem; border-radius:50px; font-size:0.72rem; }
  .stat-total    { background:rgba(123,43,255,0.12); border:1px solid rgba(123,43,255,0.24); color:#c084fc; }
  .stat-series   { background:rgba(0,232,192,0.09); border:1px solid rgba(0,232,192,0.22); color:#00E8C0; }
  .stat-short    { background:rgba(42,47,255,0.12); border:1px solid rgba(42,47,255,0.25); color:#8b91ff; }
  .stat-long     { background:rgba(255,200,0,0.09); border:1px solid rgba(255,200,0,0.22); color:#fbbf24; }

  /* FILTER + SORT BAR */
  .filter-bar { display:flex; gap:0.5rem; flex-wrap:wrap; margin-bottom:1.2rem; align-items:center; }
  .filter-select { background:rgba(7,10,32,0.7); border:1px solid rgba(123,43,255,0.18); border-radius:8px; padding:0.38rem 0.75rem; font-family:'Switzer',sans-serif; font-size:0.75rem; color:#F0F2FF; outline:none; cursor:pointer; }

  /* IDEA CARDS GRID */
  .ideas-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(320px,1fr)); gap:1rem; }
  @media(max-width:700px){ .ideas-grid{ grid-template-columns:1fr; } }

  /* IDEA CARD */
  .idea-card {
    background:rgba(7,10,32,0.72); border:1px solid rgba(123,43,255,0.2);
    border-radius:18px; overflow:hidden; transition:border-color 0.2s, transform 0.2s;
    position:relative;
  }
  .idea-card:hover { border-color:rgba(123,43,255,0.42); transform:translateY(-2px); }
  .idea-card.starred { border-color:rgba(255,200,0,0.35); background:linear-gradient(145deg,rgba(7,10,32,0.85),rgba(30,25,0,0.3)); }
  .idea-card-top { padding:1.1rem 1.2rem 0; }
  .idea-card-badges { display:flex; flex-wrap:wrap; gap:0.35rem; margin-bottom:0.75rem; }
  .badge { display:inline-flex; align-items:center; gap:0.25rem; font-size:0.62rem; font-weight:500; letter-spacing:0.1em; text-transform:uppercase; padding:0.18rem 0.6rem; border-radius:50px; }
  .badge-platform { background:rgba(42,47,255,0.14); border:1px solid rgba(42,47,255,0.26); color:#8b91ff; }
  .badge-format   { background:rgba(123,43,255,0.14); border:1px solid rgba(123,43,255,0.26); color:#c084fc; }
  .badge-series   { background:rgba(0,232,192,0.1); border:1px solid rgba(0,232,192,0.25); color:#00E8C0; }
  .badge-trend    { background:rgba(255,100,50,0.12); border:1px solid rgba(255,100,50,0.28); color:#fb923c; }
  .idea-title { font-family:'Gambarino',Georgia,serif; font-size:1.1rem; line-height:1.25; margin-bottom:0.6rem; padding-right:2rem; }
  .idea-why { font-size:0.8rem; color:rgba(240,242,255,0.58); line-height:1.68; margin-bottom:0.85rem; }
  .star-btn { position:absolute; top:1rem; right:1.1rem; background:none; border:none; cursor:pointer; color:rgba(240,242,255,0.2); transition:all 0.2s; padding:0; }
  .star-btn:hover { color:#fbbf24; transform:scale(1.15); }
  .star-btn.on { color:#fbbf24; }

  /* HOOKS */
  .hooks-section { border-top:1px solid rgba(123,43,255,0.12); }
  .hooks-toggle { display:flex; align-items:center; gap:0.5rem; padding:0.75rem 1.2rem; cursor:pointer; font-size:0.72rem; font-weight:500; letter-spacing:0.08em; text-transform:uppercase; color:rgba(240,242,255,0.45); transition:color 0.2s; background:none; border:none; width:100%; text-align:left; }
  .hooks-toggle:hover { color:#F0F2FF; }
  .hooks-toggle svg { color:#9D4EFF; }
  .hooks-body { padding:0 1.2rem 1.2rem; }
  .hook-item { margin-bottom:0.75rem; }
  .hook-type { font-size:0.62rem; font-weight:600; letter-spacing:0.13em; text-transform:uppercase; margin-bottom:0.28rem; display:flex; align-items:center; gap:0.28rem; }
  .hook-type.curiosity    { color:#9D4EFF; }
  .hook-type.controversy  { color:#ff8080; }
  .hook-type.result       { color:#00E8C0; }
  .hook-text { font-size:0.82rem; color:rgba(240,242,255,0.78); line-height:1.65; background:rgba(7,10,32,0.6); border-radius:8px; padding:0.6rem 0.75rem; border-left:2px solid; }
  .hook-text.curiosity   { border-color:rgba(123,43,255,0.4); }
  .hook-text.controversy { border-color:rgba(255,80,80,0.4); }
  .hook-text.result      { border-color:rgba(0,232,192,0.35); }

  /* CARD ACTIONS */
  .card-actions { padding:0.7rem 1.2rem 1.1rem; display:flex; gap:0.45rem; flex-wrap:wrap; }
  .act-btn { background:rgba(123,43,255,0.1); border:1px solid rgba(123,43,255,0.2); border-radius:7px; padding:0.3rem 0.7rem; font-size:0.68rem; font-weight:500; letter-spacing:0.07em; text-transform:uppercase; color:#9D4EFF; cursor:pointer; transition:all 0.18s; display:flex; align-items:center; gap:0.28rem; font-family:'Switzer',sans-serif; }
  .act-btn:hover { background:rgba(123,43,255,0.2); border-color:#9D4EFF; color:#F0F2FF; }

  /* SEO ROW */
  .seo-row { padding:0 1.2rem 0.9rem; display:flex; flex-wrap:wrap; gap:0.35rem; }
  .seo-kw { font-size:0.67rem; color:rgba(240,242,255,0.4); background:rgba(42,47,255,0.07); border:1px solid rgba(42,47,255,0.14); border-radius:4px; padding:0.12rem 0.45rem; }

  /* SERIES SECTION */
  .series-section { border-top:1px solid rgba(0,232,192,0.15); padding:0.75rem 1.2rem; background:rgba(0,232,192,0.04); }
  .series-label { font-size:0.62rem; font-weight:600; letter-spacing:0.12em; text-transform:uppercase; color:#00E8C0; margin-bottom:0.25rem; display:flex; align-items:center; gap:0.3rem; }
  .series-desc { font-size:0.77rem; color:rgba(240,242,255,0.6); line-height:1.6; }

  /* EXPORT PANEL */
  .export-bar { display:flex; gap:0.6rem; flex-wrap:wrap; margin-bottom:1.2rem; }

  /* TOAST */
  .toast { position:fixed; bottom:2rem; right:2rem; background:rgba(0,232,192,0.12); border:1px solid rgba(0,232,192,0.32); color:#00E8C0; padding:0.6rem 1.1rem; border-radius:50px; font-size:0.77rem; font-weight:500; letter-spacing:0.06em; display:flex; align-items:center; gap:0.4rem; animation:slideUp 0.25s ease; z-index:999; }
  @keyframes slideUp { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }

  .sp-root ::-webkit-scrollbar { width:4px; }
  .sp-root ::-webkit-scrollbar-thumb { background:rgba(123,43,255,0.3); border-radius:2px; }

  /* IMAGE PROMPT BOX */
  .img-prompt-box { background:rgba(7,10,32,0.85); border:1px solid rgba(196,0,255,0.22); border-radius:11px; padding:0.85rem 0.95rem; margin-top:0.6rem; }
  .img-prompt-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:0.55rem; flex-wrap:wrap; gap:0.4rem; }
  .img-prompt-label { font-size:0.6rem; font-weight:600; letter-spacing:0.14em; text-transform:uppercase; color:#C400FF; display:flex; align-items:center; gap:0.3rem; }
  .img-prompt-models { display:flex; gap:0.28rem; flex-wrap:wrap; }
  .img-model-tag { font-size:0.58rem; font-weight:500; letter-spacing:0.07em; padding:0.12rem 0.45rem; border-radius:50px; background:rgba(196,0,255,0.1); border:1px solid rgba(196,0,255,0.22); color:#e879f9; }
  .img-prompt-text { font-family:'DM Mono','Courier New',monospace; font-size:0.74rem; color:rgba(240,242,255,0.68); line-height:1.7; background:rgba(0,0,0,0.3); border-radius:7px; padding:0.6rem 0.75rem; white-space:pre-wrap; word-break:break-word; margin-bottom:0.55rem; border:1px solid rgba(255,255,255,0.05); }
  .img-prompt-copy { display:inline-flex; align-items:center; gap:0.28rem; background:rgba(196,0,255,0.1); border:1px solid rgba(196,0,255,0.25); border-radius:50px; padding:0.24rem 0.75rem; font-size:0.65rem; font-weight:500; letter-spacing:0.07em; text-transform:uppercase; color:#e879f9; cursor:pointer; transition:all 0.18s; font-family:'Switzer',sans-serif; }
  .img-prompt-copy:hover { background:rgba(196,0,255,0.2); color:#F0F2FF; }

  /* ── OUTPUT GATE ── */
  .gate-wrap { position:relative; }
  .gate-preview-badge { display:inline-flex; align-items:center; gap:0.4rem; background:rgba(255,200,0,0.1); border:1px solid rgba(255,200,0,0.25); border-radius:50px; padding:0.22rem 0.75rem; font-size:0.62rem; font-weight:600; letter-spacing:0.13em; text-transform:uppercase; color:#fbbf24; margin-bottom:0.85rem; }

  .gate-blurred { filter:blur(5px); pointer-events:none; user-select:none; opacity:0.6; overflow:hidden; max-height:340px; }
  .gate-overlay { position:relative; margin-top:-2rem; background:linear-gradient(to bottom, transparent 0%, rgba(7,10,32,0.97) 28%); border-radius:0 0 20px 20px; padding:2.5rem 1.8rem 2rem; text-align:center; z-index:10; }
  .gate-overlay-inner { background:linear-gradient(135deg,rgba(13,16,53,0.95),rgba(30,10,55,0.9)); border:1px solid rgba(123,43,255,0.32); border-radius:20px; padding:2rem 1.8rem; position:relative; overflow:hidden; }
  .gate-overlay-inner::before { content:''; position:absolute; top:0; left:0; right:0; height:1px; background:linear-gradient(90deg,transparent,#9D4EFF,transparent); }

              <span className="chip cc"><Repeat size={10}/> Series Potential</span>
              <span className="chip cm"><TrendingUp size={10}/> Trend Signals</span>
              <span className="chip cy"><Star size={10}/> Thumbnail Direction</span>
            </div>
          </div>

          <div className="sp-layout">

            {/* ── LEFT ──────────────────────────────────────────────────── */}
            <div>
              <div className="panel">
                <p className="panel-title"><Film size={16}/> Channel Brief</p>

                <span className="eyebrow">Channel / Brand Description *</span>
                <textarea className="t-input" rows={4}
                  placeholder="Describe your channel — niche, vibe, what kind of content you make, and who it's for..."
                  value={channelDesc} onChange={e=>setChannelDesc(e.target.value)} maxLength={600}/>
                <p className="char-count">{channelDesc.length}/600</p>

                <div className="divider"/>

                <span className="eyebrow">Target Audience (optional)</span>
                <input className="t-input" type="text"
                  placeholder="e.g. entrepreneurs aged 25-40, beginner creators..."
                  value={audience} onChange={e=>setAudience(e.target.value)}/>
              </div>

              <div className="panel">
                <p className="panel-title"><Hash size={16}/> Topics of Interest</p>
                <div className="topic-input-row">
                  <input className="t-input" type="text" placeholder="Add a topic and press +"
                    value={topicInput} onChange={e=>setTopicInput(e.target.value)}
                    onKeyDown={e=>e.key==='Enter'&&addTopic()}/>
                  <div className="add-topic-btn" onClick={addTopic}><Plus size={16}/></div>
                </div>
                {topics.length > 0 && (
                  <div className="topic-tags">
                    {topics.map(t=>(
                      <span key={t} className="topic-tag">
                        {t}
                        <span className="topic-tag-x" onClick={()=>removeTopic(t)}><X size={11}/></span>
                      </span>
                    ))}
                  </div>
                )}
                {topics.length === 0 && (
                  <p style={{fontSize:'0.72rem',color:'rgba(240,242,255,0.28)',marginTop:'0.5rem',lineHeight:1.6}}>Topics will be inferred from your channel description if left empty.</p>
                )}
              </div>

              <div className="panel">
                <p className="panel-title"><Play size={16}/> Content Settings</p>

                <span className="eyebrow">Target Platforms</span>
                <div className="plat-grid">
                  {PLATFORMS.map(p=>(
                    <div key={p.id} className={`plat${platforms.includes(p.id)?' on':''}`} onClick={()=>togglePlat(p.id)}>
                      <span className="plat-ico">{p.icon}</span>{p.label}
                    </div>
                  ))}
                </div>

                <div className="divider"/>

                <span className="eyebrow">Content Style</span>
                <div className="pill-row">
                  {STYLES.map(s=>(
                    <div key={s} className={`pill${style===s?' on':''}`} onClick={()=>setStyle(s)}>{s}</div>
                  ))}
                </div>

                <div className="divider"/>

                <span className="eyebrow">Number of Ideas</span>
                <div className="count-btns">
                  {IDEA_COUNTS.map(n=>(
                    <div key={n} className={`count-btn${ideaCount===n?' on':''}`} onClick={()=>setIdeaCount(n)}>{n}</div>
                  ))}
                </div>
              </div>

              <button className={`btn btn-gen${isRunning?' running':''}`}
                disabled={isRunning||!channelDesc.trim()}
                onClick={generate}>
                {isRunning
                  ? <><Loader size={15} className="spin"/> Generating Ideas...</>
                  : <><Zap size={15}/> Generate {ideaCount} Video Ideas</>}
              </button>

              {steps.length > 0 && (
                <div className="step-list" style={{marginTop:'1rem'}}>
                  {steps.map(s=>(
                    <div key={s.id} className={`step-item${s.status==='active'?' active':s.status==='done'?' done':''}`}>
                      <div className="sdot"/>
                      <span className="slabel">{s.status==='done'?'✓ ':s.status==='active'?'⟳ ':''}{s.label}</span>
                    </div>
                  ))}
                </div>
              )}
            </div>

            {/* ── RIGHT ─────────────────────────────────────────────────── */}
            <div>
              <div className="panel" style={{minHeight:520}}>

                {phase==='idle' && (
                  <div className="out-empty">
                    <Lightbulb size={44} strokeWidth={1} color="#9D4EFF"/>
                    <p>Describe your channel and generate a full deck of scroll-stopping video ideas</p>
                  </div>
                )}
                {isRunning && !ideas.length && (
                  <div className="out-empty">
                    <Loader size={38} strokeWidth={1} color="#9D4EFF" className="spin"/>
                    <p>Brainstorming ideas and crafting hook angles...</p>
                  </div>
                )}
                {phase==='error' && (
                  <div className="out-empty">
                    <AlertCircle size={36} color="#ff8080"/>
                    <p style={{color:'#ff8080'}}>Something went wrong. Try again.</p>
                  </div>
                )}

                {ideas.length > 0 && (
                  <div className="gate-wrap">
                    <span className="gate-preview-badge">👁 Sample Preview — First 3 ideas visible · Full deck locked</span>
                  <>
                    {/* STATS */}
                    <div className="stats-bar">
                      <span className="stat-pill stat-total"><Lightbulb size={11}/> {ideas.length} Ideas</span>
                      {seriesCount>0 && <span className="stat-pill stat-series"><Repeat size={11}/> {seriesCount} Series</span>}
                      {shortCount>0 && <span className="stat-pill stat-short"><Play size={11}/> {shortCount} Short-form</span>}
                      {longCount>0 && <span className="stat-pill stat-long"><Film size={11}/> {longCount} Long-form</span>}
                      {starredCount>0 && <span className="stat-pill" style={{background:'rgba(255,200,0,0.1)',border:'1px solid rgba(255,200,0,0.25)',color:'#fbbf24'}}><Star size={11}/> {starredCount} Saved</span>}
                    </div>

                    {/* EXPORT + FILTER */}
                    <div className="export-bar">
                      <button className="btn btn-cyan btn-sm" onClick={()=>gatedDownload(downloadDeck)}>
                        <Download size={11}/> Export Deck
                      </button>
                      <button className="btn btn-ghost btn-sm" onClick={()=>copy(JSON.stringify(ideas,null,2),'json')}>
                        {copied==='json'?<Check size={11}/>:<Copy size={11}/>} Copy JSON
                      </button>
                    </div>

                    {/* FILTERS */}
                    <div className="filter-bar">
                      <select className="filter-select" value={filterPlatform} onChange={e=>setFilterPlatform(e.target.value)}>
                        <option value="all">All Platforms</option>
                        {PLATFORMS.map(p=><option key={p.id} value={p.id}>{p.label}</option>)}
                      </select>
                      <select className="filter-select" value={filterType} onChange={e=>setFilterType(e.target.value)}>
                        <option value="all">All Types</option>
                        <option value="series">Series Only</option>
                        <option value="short">Short-form</option>
                        <option value="long">Long-form</option>
                        <option value="trending">Trending</option>
                      </select>
                      <div className={`pill${showStarred?' on':''}`} style={{cursor:'pointer'}} onClick={()=>setShowStarred(p=>!p)}>
                        <Star size={10}/> Saved only
                      </div>
                      <span style={{fontSize:'0.72rem',color:'rgba(240,242,255,0.3)',marginLeft:'auto'}}>
                        {displayIdeas.length} showing
                      </span>
                    </div>

                    {/* IDEAS GRID */}
                    <div className="ideas-grid">
                      {(isUnlocked ? displayIdeas : displayIdeas.slice(0,3)).map((idea) => (
                        <div key={idea.id} className={`idea-card${starred[idea.id]?' starred':''}`}>
                          <div className="idea-card-top">
                            <button className={`star-btn${starred[idea.id]?' on':''}`} onClick={()=>toggleStar(idea.id)}>
                              <Star size={16} fill={starred[idea.id]?'#fbbf24':'none'}/>
                            </button>
                            <div className="idea-card-badges">
                              {(idea.platforms||[]).slice(0,2).map(p=>(
                                <span key={p} className="badge badge-platform">
                                  {PLATFORMS.find(pl=>pl.label===p||pl.id===p.toLowerCase())?.icon||'📱'} {p}
                                </span>
                              ))}
                              <span className="badge badge-format">{idea.formatType||'Video'}</span>
                              {idea.duration && <span className="badge" style={{background:'rgba(255,255,255,0.05)',border:'1px solid rgba(255,255,255,0.1)',color:'rgba(240,242,255,0.45)'}}><Clock size={9}/> {idea.duration}</span>}
                              {idea.isSeries && <span className="badge badge-series"><Repeat size={9}/> Series</span>}
                              {idea.isTrending && <span className="badge badge-trend"><Flame size={9}/> Trending</span>}
                            </div>
                            <p className="idea-title">{idea.title}</p>
                            <p className="idea-why">{idea.why}</p>
                          </div>

                          {/* SEO keywords inline */}
                          {idea.seoKeywords?.length > 0 && (
                            <div className="seo-row">
                              {idea.seoKeywords.map((kw,i)=><span key={i} className="seo-kw">{kw}</span>)}
                            </div>
                          )}

                          {/* Series box */}
                          {idea.isSeries && idea.seriesConcept && (
                            <div className="series-section">
                              <p className="series-label"><Repeat size={10}/> {idea.seriesName||'Recurring Series'}</p>
                              <p className="series-desc">{idea.seriesConcept}</p>
                            </div>
                          )}

                          {/* Hooks — collapsible */}
                          <div className="hooks-section">
                            <button className="hooks-toggle" onClick={()=>toggleExp(idea.id)}>
                              <Flame size={12}/>
                              Hook Angles
                              {expanded[idea.id] ? <ChevronUp size={13}/> : <ChevronDown size={13}/>}
                            </button>
                            {expanded[idea.id] && (
                              <div className="hooks-body">
                                <div className="hook-item">
                                  <p className="hook-type curiosity">🔮 Curiosity</p>
                                  <p className="hook-text curiosity">{idea.hooks?.curiosity}</p>
                                </div>
                                <div className="hook-item">
                                  <p className="hook-type controversy">⚡ Controversy</p>
                                  <p className="hook-text controversy">{idea.hooks?.controversy}</p>
                                </div>
                                <div className="hook-item">
                                  <p className="hook-type result">✅ Result</p>
                                  <p className="hook-text result">{idea.hooks?.result}</p>
                                </div>
                                {idea.thumbnailDirection && (
                                  <div style={{marginTop:'0.6rem',padding:'0.55rem 0.7rem',background:'rgba(255,200,0,0.06)',border:'1px solid rgba(255,200,0,0.15)',borderRadius:8}}>
                                    <p style={{fontSize:'0.62rem',fontWeight:600,letterSpacing:'0.12em',textTransform:'uppercase',color:'#fbbf24',marginBottom:'0.22rem'}}>🖼 Thumbnail Direction</p>
                                    <p style={{fontSize:'0.77rem',color:'rgba(240,242,255,0.65)',lineHeight:1.6}}>{idea.thumbnailDirection}</p>
                                  </div>
                                )}
                                {idea.thumbnailMJPrompt && (
                                  <div className="img-prompt-box">
                                    <div className="img-prompt-header">
                                      <span className="img-prompt-label">🎨 Image Gen Prompt</span>
                                      <div className="img-prompt-models">
                                        <span className="img-model-tag">Midjourney</span>
                                        <span className="img-model-tag">DALL-E 3</span>
                                        <span className="img-model-tag">Flux</span>
                                      </div>
                                    </div>
                                    <div className="img-prompt-text">{idea.thumbnailMJPrompt}</div>
                                    <div className="img-prompt-copy" onClick={()=>copy(idea.thumbnailMJPrompt, idea.id+'mj')}>
                                      {copied===idea.id+'mj' ? <Check size={10}/> : <Copy size={10}/>}
                                      {copied===idea.id+'mj' ? 'Copied!' : 'Copy Prompt'}
                                    </div>
                                  </div>
                                )}
                              </div>
                            )}
                          </div>

                          {/* Card actions */}
                          <div className="card-actions">
                            <button className="act-btn" onClick={()=>copy(
                              `${idea.title}\n\nHooks:\n• ${idea.hooks?.curiosity}\n• ${idea.hooks?.controversy}\n• ${idea.hooks?.result}\n\nCTA: ${idea.cta||''}`,
                              idea.id
                            )}>
                              {copied===idea.id?<Check size={10}/>:<Copy size={10}/>} Copy Idea
                            </button>
                            <button className="act-btn" onClick={()=>copy(
                              `${idea.hooks?.curiosity}\n${idea.hooks?.controversy}\n${idea.hooks?.result}`,
                              idea.id+'h'
                            )}>
                              {copied===idea.id+'h'?<Check size={10}/>:<Copy size={10}/>} Copy Hooks
                            </button>
                          </div>
                        </div>
                      ))}
                    </div>

                    {displayIdeas.length === 0 && (
                      <div style={{textAlign:'center',padding:'3rem 0',opacity:0.4}}>
                        <p style={{fontSize:'0.83rem',color:'rgba(240,242,255,0.5)'}}>No ideas match your current filters.</p>
                      </div>
                    )}
                    {!isUnlocked && displayIdeas.length > 3 && (
                      <div className="gate-blurred" style={{height:220,background:'rgba(7,10,32,0.4)',borderRadius:12}}/>
                    )}
                  </>
                  {!isUnlocked && <GateOverlay codeId="sparkCode"/>}
                  </div>
                )}
              </div>
            </div>

          </div>
        </div>
      </div>
      {toast && <div className="toast"><Check size={13}/> {toast}</div>}

      {showPaywall && (
        <div className="pw-overlay" onClick={e=>{ if(e.target===e.currentTarget){ setShowPaywall(false); } }}>
          <div className="pw-card">
            <div className="pw-lock">🔒</div>
            <h2 className="pw-title">Your results are ready to save</h2>
            <p className="pw-sub">Generate freely — download your personalized output when you're on a package or grab one-time access.</p>
            <div className="pw-options">
              <button className="pw-opt pw-opt-primary" onClick={()=>{ setShowPaywall(false); window.open('https://toolzyo.com/#pricing','_blank'); }}>
                <div className="pw-opt-label">📦 View Packages</div>
                <div className="pw-opt-text">Content Engine · Full Service · Strategy Snapshot</div>
                <div className="pw-opt-price">From $397 · Includes unlimited downloads</div>
              </button>
              <button className="pw-opt pw-opt-secondary" onClick={()=>{ setShowPaywall(false); window.open('https://toolzyo.com/vault','_blank'); }}>
                <div className="pw-opt-label">⚡ One-Time Download</div>
                <div className="pw-opt-text">Pay once, download this result now</div>
                <div className="pw-opt-price">$9 per export — available in The Vault</div>
              </button>
            </div>
            <div className="pw-divider"/>
            <p className="pw-code-lbl">Already have access? Enter your code</p>
            <div className="pw-code-row">
              <input className="pw-code-input" id="pwCodeInput" placeholder="Access code" type="text" onKeyDown={e=>e.key==='Enter'&&unlockWithCode('pwCodeInput')}/>
              <button className="pw-code-btn" onClick={()=>unlockWithCode('pwCodeInput')}>Unlock</button>
            </div>
            <button className="pw-dismiss" onClick={()=>setShowPaywall(false)}>Continue browsing without downloading</button>
          </div>
        </div>
      )}

    </>
  );
}


const container = document.getElementById('root');
const root = ReactDOM.createRoot(container);
root.render(React.createElement(ToolzyoSpark));
</script>
</body>
</html>
