`;

/* ─────────────────────────────────────────────────────────────────────────
   CONSTANTS
───────────────────────────────────────────────────────────────────────── */
const PLATFORMS = [
  { id:'instagram', icon:'📸', label:'Instagram' },
  { id:'tiktok',   icon:'🎵', label:'TikTok' },
  { id:'youtube',  icon:'▶️', label:'YouTube' },
  { id:'twitter',  icon:'𝕏',  label:'X / Twitter' },
];

const FORMATS = ['Reel / Short','Carousel','Static Post','Story','Thread'];
const TONES   = ['Hype & Bold','Educational','Storytelling','Conversational','Inspirational','Controversial','Behind the Scenes'];
const HOOKS   = ['Question','Bold Statement','Controversial Take','Story Opener','Stat or Fact','Direct CTA'];
const NICHES  = ['Creator Economy','AI & Tech','Business & Entrepreneurship','Lifestyle','Health & Fitness','Finance','Fashion & Beauty','Food','Travel','Gaming'];

function parseJSON(raw) {
  try { return JSON.parse(raw.replace(/```json|```/g,'').trim()); }
  catch { return null; }
}

/* ─────────────────────────────────────────────────────────────────────────
   MAIN COMPONENT
───────────────────────────────────────────────────────────────────────── */
function ToolzyoContentCreatorStudio() {
  const [activeTab, setActiveTab] = useState('captions');

  const [copied, setCopied]       = useState('');

  // Gate

            <div className="gate-opt-label">This Result</div>

            <div className="gate-opt-label">This Tool · 14 Days</div>
            <div className="gate-opt-price">$127</div>
            <div className="gate-opt-desc">Unlimited use for 14 days</div>
          </button>
        </div>

          <div className="gate-divider-line"/>
        </div>
        <button className="gate-opt gate-opt-dfy" onClick={()=>window.open('https://toolzyo.com/#pricing','_blank')}>
          <div className="gate-opt-label" style={{color:'#fbbf24'}}>⭐ Done-For-You — Strategy Snapshot</div>
          <div className="gate-opt-price" style={{background:'linear-gradient(135deg,#fbbf24,#f59e0b)',WebkitBackgroundClip:'text',WebkitTextFillColor:'transparent',backgroundClip:'text'}}>$397</div>

  );

  const showToast = msg => { setToast(msg); setTimeout(()=>setToast(''),2200); };

    setCopied(key); showToast('Copied!');
    setTimeout(()=>setCopied(''),2200);
  };

  // ── CAPTIONS STATE ──
  const [brand, setBrand]           = useState('');
  const [niche, setNiche]           = useState('Creator Economy');
  const [platforms, setPlatforms]   = useState(['instagram','tiktok']);
  const [format, setFormat]         = useState('Reel / Short');
  const [tone, setTone]             = useState('Hype & Bold');
  const [hookType, setHookType]     = useState('Bold Statement');
  const [topic, setTopic]           = useState('');
  const [affiliateInCaption, setAffInCaption] = useState('');
  const [captionCount, setCaptionCount] = useState(3);
  const [captions, setCaptions]     = useState([]);
  const [capPhase, setCapPhase]     = useState('idle');
  const [capSteps, setCapSteps]     = useState([]);

  const togglePlat = id => setPlatforms(p => p.includes(id) ? p.filter(x=>x!==id) : [...p,id]);

  const generateCaptions = async () => {
    if (!brand.trim() || !topic.trim()) return;
    setCapPhase('running'); setCaptions([]);
    const steps = [
      { id:'analyze', label:'Analyzing brand voice & platform norms', status:'idle' },
      { id:'write',   label:`Writing ${captionCount} captions with hooks`,      status:'idle' },
      { id:'polish',  label:'Polishing for scroll-stopping performance',  status:'idle' },
    ];
    setCapSteps(steps);
    const setS = (id, s) => setCapSteps(p => p.map(x=>x.id===id?{...x,status:s}:x));

    try {
      setS('analyze','active'); await new Promise(r=>setTimeout(r,300));
      setS('analyze','done'); setS('write','active');

      const platStr = platforms.map(id => PLATFORMS.find(p=>p.id===id)?.label||id).join(', ');
      const res = await fetch('https://api.anthropic.com/v1/messages', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({
          model:'claude-sonnet-4-20250514', max_tokens:2500,
          messages:[{ role:'user', content:
`You are a top-tier social media content creator and copywriter who has grown brands to millions of followers on Instagram and TikTok.

Brand: ${brand}
Niche: ${niche}
Platforms: ${platStr}
Content Format: ${format}
Tone: ${tone}
Hook Style: ${hookType}
Topic / Content Angle: ${topic}
${affiliateInCaption ? `Include affiliate/product mention: ${affiliateInCaption}` : ''}

Generate ${captionCount} unique, high-performing captions. Each should feel native to the platform, not generic.

Return ONLY valid JSON:
{
  "captions": [
    {
      "platform": "Instagram or TikTok or YouTube",
      "hook": "First line only — max 8 words — must stop the scroll instantly",
      "caption": "Full caption (120-250 words). Use line breaks and white space for rhythm. Conversational and punchy. No fluff. End with engagement bait.",
      "hashtags": ["#tag1","#tag2","#tag3","#tag4","#tag5","#tag6","#tag7"],
      "cta": "One specific, action-driving CTA sentence",
      "format": "${format}",
      "tone": "${tone}"
    }
  ]
}`
          }]
        })
      });
      const data = await res.json();
      const parsed = parseJSON(data.content?.[0]?.text || '{}');
      setS('write','done'); setS('polish','active');
      await new Promise(r=>setTimeout(r,300));
      setS('polish','done');
      if (parsed?.captions) { setCaptions(parsed.captions); setCapPhase('done'); }
      else setCapPhase('error');
    } catch(e) { console.error(e); setCapPhase('error'); }
  };

  // ── IDEAS STATE ──
  const [ideasBrand, setIdeasBrand]     = useState('');
  const [ideasNiche, setIdeasNiche]     = useState('Creator Economy');

  const [ideas, setIdeas]               = useState([]);
  const [ideasPhase, setIdeasPhase]     = useState('idle');
  const [ideasSteps, setIdeasSteps]     = useState([]);

  const generateIdeas = async () => {
    if (!ideasBrand.trim()) return;
    setIdeasPhase('running'); setIdeas([]);
    const steps = [
      { id:'research', label:'Researching what performs in your niche', status:'idle' },
      { id:'ideate',   label:`Generating ${ideaCount} content ideas`,    status:'idle' },
    ];
    setIdeasSteps(steps);
    const setS = (id,s) => setIdeasSteps(p=>p.map(x=>x.id===id?{...x,status:s}:x));

    try {
      setS('research','active'); await new Promise(r=>setTimeout(r,300));
      setS('research','done'); setS('ideate','active');

      const platLabel = PLATFORMS.find(p=>p.id===ideasPlatform)?.label || ideasPlatform;
      const res = await fetch('https://api.anthropic.com/v1/messages', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({
          model:'claude-sonnet-4-20250514', max_tokens:2000,
          messages:[{ role:'user', content:
`You are a viral content strategist specializing in Instagram and TikTok growth.

Brand: ${ideasBrand}
Niche: ${ideasNiche}
Platform: ${platLabel}
Goal: ${ideasGoal}

Generate ${ideaCount} specific, high-potential content ideas for this brand. Not generic titles — actual angles that would work.

Return ONLY valid JSON:
{
  "ideas": [
    {
      "title": "Specific, compelling content idea title",
      "angle": "The exact angle or hook that makes this interesting (1 sentence)",
      "format": "Reel / Carousel / Static / Story / Thread",
      "why": "Why this will perform well for this specific brand and goal (1 sentence)",
      "difficulty": "Easy / Medium / Hard"
    }
  ]
}`
          }]
        })
      });
      const data = await res.json();
      const parsed = parseJSON(data.content?.[0]?.text||'{}');
      setS('ideate','done');
      if (parsed?.ideas) { setIdeas(parsed.ideas); setIdeasPhase('done'); }
      else setIdeasPhase('error');
    } catch(e) { console.error(e); setIdeasPhase('error'); }

  // ── AFFILIATE LINKS STATE ──
  const [affName, setAffName]   = useState('');
  const [affUrl, setAffUrl]     = useState('');
  const [affLinks, setAffLinks] = useState([]);

  const addLink = () => {
    if (!affName.trim() || !affUrl.trim()) return;
    setAffLinks(p => [...p, { id:Date.now(), name:affName.trim(), url:affUrl.trim() }]);
    setAffName(''); setAffUrl('');
    showToast('Link added!');

  const delLink = id => setAffLinks(p => p.filter(l=>l.id!==id));

  // ── SAVED STATE ──

  const saveCaption = (cap) => {
    setSaved(p => [{
      id: Date.now(),
      platform: cap.platform,
      type: 'Caption',
      text: `${cap.hook}\n\n${cap.caption}\n\n${(cap.hashtags||[]).join(' ')}\n\n${cap.cta}`,
      savedAt: new Date().toLocaleString()
    }, ...p]);
    showToast('Saved!');
  };
  const delSaved = id => setSaved(p => p.filter(x=>x.id!==id));

  const TAB_CONFIG = [
    { id:'captions', icon:<FileText size={14}/>,   label:'Captions' },

    { id:'links',    icon:<Link size={14}/>,        label:'Affiliate Links' },

          <div className="main-tabs">
            {TAB_CONFIG.map(t => (
              <button key={t.id} className={`main-tab${activeTab===t.id?' on':''}`} onClick={()=>setActiveTab(t.id)}>
                {t.icon} {t.label}
              </button>
            ))}
          </div>

          {/* ══════════════════════════════════

          ══════════════════════════════════ */}

                <div className="panel">

                  <div style={{marginTop:'0.75rem'}}>
                    <span className="eyebrow">Niche</span>
                    <select className="t-select" value={niche} onChange={e=>setNiche(e.target.value)}>

                {capSteps.length > 0 && (

                {captions.length > 0 && (

                      <div key={i} className="caption-card">

                            {PLATFORMS.find(p=>p.label===cap.platform||p.id===cap.platform?.toLowerCase())?.icon||'📱'} {cap.platform}

                          <div style={{display:'flex',gap:'0.4rem'}}>

                          <div className="cap-tags">{(cap.hashtags||[]).map((h,j)=><span key={j} className="cap-tag">{h}</span>)}</div>
                          <p className="cap-label"><Star size={10}/> CTA</p>
                          <div className="cap-cta">{cap.cta}</div>

                    {/* Remaining captions — gated */}

                              <div className="cap-hook">{cap.hook}</div>
                              <p className="cap-text">{cap.caption}</p>

                          <span className={`caption-plat-badge caption-plat-${cap.platform?.toLowerCase().includes('tik')?'tt':cap.platform?.toLowerCase().includes('you')?'yt':'ig'}`}>
                            {PLATFORMS.find(p=>p.label===cap.platform||p.id===cap.platform?.toLowerCase())?.icon||'📱'} {cap.platform}
                          </span>
                          <div style={{display:'flex',gap:'0.4rem'}}>
                            <button className="btn btn-ghost btn-sm" onClick={()=>saveCaption(cap)}><Bookmark size={11}/> Save</button>
                            <button className="btn btn-ghost btn-sm" onClick={()=>copy(`${cap.hook}\n\n${cap.caption}\n\n${(cap.hashtags||[]).join(' ')}\n\n${cap.cta}`,`cap${i+1}`)}>{copied===`cap${i+1}`?<Check size={11}/>:<Copy size={11}/>} Copy</button>

                    <span className="eyebrow">Niche</span>
                    <select className="t-select" value={ideasNiche} onChange={e=>setIdeasNiche(e.target.value)}>
                      {NICHES.map(n=><option key={n}>{n}</option>)}
                    </select>
                  </div>
                  <div style={{marginTop:'0.75rem'}}>
                    <span className="eyebrow">Platform Focus</span>
                    <div className="plat-grid">
                      {PLATFORMS.map(p=>(
                        <div key={p.id} className={`plat${ideasPlatform===p.id?' on':''}`} onClick={()=>setIdeasPlat(p.id)}>
                          <span className="plat-ico">{p.icon}</span>{p.label}
                        </div>
                      ))}
                    </div>
                  </div>
                  <div className="divider"/>
                  <span className="eyebrow">Goal</span>
                  <div className="pill-row">
                    {['Grow followers','Drive sales','Increase engagement','Build authority','Go viral'].map(g=>(
                      <div key={g} className={`pill${ideasGoal===g?' on':''}`} onClick={()=>setIdeasGoal(g)}>{g}</div>
                    ))}
                  </div>
                  <div className="divider"/>
                  <span className="eyebrow">Number of Ideas</span>
                  <div className="pill-row">
                    {[5,10,15,20].map(n=><div key={n} className={`pill${ideaCount===n?' on':''}`} onClick={()=>setIdeaCount(n)}>{n}</div>)}
                  </div>
                </div>

                <button className={`btn btn-gen${ideasPhase==='running'?' running':''}`}
                  disabled={ideasPhase==='running'||!ideasBrand.trim()}
                  onClick={generateIdeas}>
                  {ideasPhase==='running' ? <><Loader size={14} className="spin"/> Generating...</> : <><Lightbulb size={14}/> Generate {ideaCount} Ideas</>}
                </button>

                {ideasSteps.length > 0 && (
                  <div className="step-list">
                    {ideasSteps.map(s=>(
                      <div key={s.id} className={`step-item${s.status==='active'?' active':s.status==='done'?' done':''}`}>
                        <div className="sdot"/>
                        <span className="slabel">{s.status==='done'?'✓ ':s.status==='active'?'⟳ ':''}{s.label}</span>
                      </div>
                    ))}
                  </div>
                )}
              </div>

              <div className="panel" style={{minHeight:500}}>
                {ideasPhase==='idle' && (
                  <div className="out-empty">
                    <Lightbulb size={44} strokeWidth={1} color="#FF9500"/>
                    <p>Describe your channel and get a bank of high-potential content ideas</p>
                  </div>
                )}
                {ideasPhase==='running' && !ideas.length && (
                  <div className="out-empty">
                    <Loader size={36} strokeWidth={1} color="#FF9500" className="spin"/>
                    <p>Researching your niche and generating ideas...</p>
                  </div>
                )}

                {ideas.length > 0 && (
                  <div className="gate-wrap">
                    <span className="gate-preview-badge">👁 Sample Preview — First 3 ideas visible · Rest locked</span>
                    <p style={{fontSize:'0.75rem',color:'rgba(245,240,232,0.38)',marginBottom:'1rem'}}>{ideas.length} ideas generated</p>
                    <div className="ideas-grid">
                      {(isUnlocked ? ideas : ideas.slice(0,3)).map((idea,i)=>(
                        <div key={i} className="idea-card">
                          <span className="idea-num">{String(i+1).padStart(2,'0')}</span>
                          <p className="idea-title">{idea.title}</p>
                          <p className="idea-why"><em style={{color:'#FF9500',fontStyle:'normal'}}>Angle:</em> {idea.angle}</p>
                          <p className="idea-why" style={{marginBottom:'0.5rem'}}><em style={{color:'rgba(245,240,232,0.4)',fontStyle:'normal'}}>Why it works:</em> {idea.why}</p>
                          <div className="idea-badges">
                            <span className="idea-badge">{idea.format}</span>
                            <span className="idea-badge" style={{background:'rgba(255,215,0,0.08)',borderColor:'rgba(255,215,0,0.2)',color:'#FFD700'}}>{idea.difficulty}</span>
                          </div>
                        </div>
                      ))}
                    </div>
                    {!isUnlocked && ideas.length > 3 && (
                      <div className="gate-blurred" style={{height:200,background:'rgba(10,8,0,0.4)',borderRadius:12,marginTop:'0.6rem'}}/>
                    )}
                    {!isUnlocked && ideas.length > 3 && <GateOverlay codeId="ideasCode"/>}
                  </div>
                )}
              </div>
            </div>
          )}

          {/* ══════════════════════════════════
              TAB 3 — AFFILIATE LINKS
          ══════════════════════════════════ */}
          {activeTab==='links' && (
            <div style={{maxWidth:720}}>
              <div className="panel">
                <p className="panel-title">Add Affiliate Link</p>
                <span className="eyebrow">Tool / Product Name</span>
                <input className="t-input" placeholder="e.g. CapCut, Notion, ChatGPT Plus..." value={affName} onChange={e=>setAffName(e.target.value)}/>
                <div style={{marginTop:'0.75rem'}}>
                  <span className="eyebrow">Affiliate URL</span>
                  <div className="aff-add-row">
                    <input className="t-input" placeholder="https://your-affiliate-link.com" value={affUrl} onChange={e=>setAffUrl(e.target.value)} onKeyDown={e=>e.key==='Enter'&&addLink()}/>
                    <div className="aff-add-btn" onClick={addLink}><Plus size={16}/></div>
                  </div>
                </div>
              </div>

              <div className="panel">
                <p className="panel-title">Your Links ({affLinks.length})</p>
                {affLinks.length === 0 ? (
                  <div className="aff-empty">No links saved yet.<br/>Add your affiliate links above to keep them organized.</div>
                ) : (
                  affLinks.map(link=>(
                    <div key={link.id} className="aff-link-item">
                      <Link size={15} className="aff-link-ico"/>
                      <div className="aff-link-info">
                        <p className="aff-link-name">{link.name}</p>
                        <p className="aff-link-url">{link.url}</p>
                      </div>
                      <button className="btn btn-ghost btn-sm" onClick={()=>copy(link.url,`aff${link.id}`)}>{copied===`aff${link.id}`?<Check size={10}/>:<Copy size={10}/>}</button>
                      <button className="aff-del-btn" onClick={()=>delLink(link.id)}><Trash2 size={14}/></button>
                    </div>
                  ))
                )}
              </div>
            </div>
          )}

          {/* ══════════════════════════════════
              TAB 4 — SAVED CONTENT
          ══════════════════════════════════ */}
          {activeTab==='saved' && (
            <div style={{maxWidth:760}}>
              <div className="panel">
                <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:'1rem',flexWrap:'wrap',gap:'0.5rem'}}>
                  <p className="panel-title" style={{marginBottom:0}}>Saved Content ({saved.length})</p>
                  {saved.length > 0 && (
                    <button className="btn btn-ghost btn-sm" onClick={()=>copy(saved.map(s=>`[${s.platform} · ${s.type} · ${s.savedAt}]\n${s.text}`).join('\n\n---\n\n'),'allsaved')}>
                      {copied==='allsaved'?<Check size={11}/>:<Copy size={11}/>} Copy All
                    </button>
                  )}
                </div>
                {saved.length === 0 ? (
                  <div className="saved-empty">Nothing saved yet.<br/>Generate captions and hit Save to build your content archive.</div>
                ) : (
                  saved.map(item=>(
                    <div key={item.id} className="saved-item">
                      <div className="saved-item-head">
                        <div style={{display:'flex',gap:'0.4rem',flexWrap:'wrap'}}>
                          <span className="idea-badge">{item.platform}</span>
                          <span className="idea-badge" style={{background:'rgba(255,215,0,0.08)',borderColor:'rgba(255,215,0,0.18)',color:'#FFD700'}}>{item.type}</span>
                        </div>
                        <span className="saved-item-meta">{item.savedAt}</span>
                      </div>
                      <p className="saved-item-text">{item.text}</p>
                      <div className="saved-actions">
                        <button className="btn btn-ghost btn-sm" onClick={()=>copy(item.text,`sv${item.id}`)}>{copied===`sv${item.id}`?<Check size={10}/>:<Copy size={10}/>} Copy</button>
                        <button className="btn btn-ghost btn-sm" style={{color:'rgba(255,107,107,0.7)'}} onClick={()=>delSaved(item.id)}><Trash2 size={10}/> Delete</button>
                      </div>
                    </div>
                  ))
                )}
              </div>
            </div>
          )}

        </div>
      </div>
      {toast && <div className="toast"><Check size={13}/> {toast}</div>}
    </>
  );
}


const container = document.getElementById('root');
const root = ReactDOM.createRoot(container);
root.render(React.createElement(ToolzyoContentCreatorStudio));
</script>
</body>
</html>
