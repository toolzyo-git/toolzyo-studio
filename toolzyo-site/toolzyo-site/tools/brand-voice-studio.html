  .step-circle.active { background:linear-gradient(135deg,#2A2FFF,#9D4EFF); border-color:#9D4EFF; color:#F0F2FF; box-shadow:0 0 20px rgba(157,78,255,0.5); }
  .step-circle.done { background:rgba(0,232,192,0.12); border-color:#00E8C0; color:#00E8C0; }
  .step-label { font-size:0.63rem; font-weight:500; letter-spacing:0.1em; text-transform:uppercase; color:rgba(240,242,255,0.3); white-space:nowrap; }

  .step-connector { width:80px; height:2px; background:rgba(123,43,255,0.15); margin:0 0.5rem; margin-bottom:1.5rem; transition:background 0.3s; flex-shrink:0; }

  .btn { border:none; cursor:pointer; font-family:'Switzer',sans-serif; font-weight:500; font-size:0.8rem; letter-spacing:0.08em; text-transform:uppercase; border-radius:50px; padding:0.78rem 1.6rem; transition:all 0.22s; display:inline-flex; align-items:center; gap:0.45rem; justify-content:center; }

  /* ── STEP 1: BRAND DNA ── */

                        </div>
                      ))}
                    </div>
                  </div>
                )}

                {!isUnlocked && <GateOverlay codeId="brandVoiceCode"/>}
              </div>

              <div className="nav-row">
                <button className="btn btn-ghost btn-nav" onClick={()=>setStep(2)}>
                  <ChevronLeft size={14}/> Back to Campaigns
                </button>
                <div style={{display:'flex',gap:'0.6rem',flexWrap:'wrap'}}>
                  <button className="btn btn-ghost btn-sm" onClick={()=>setSel(null)||setStep(2)}><RefreshCw size={11}/> Try Another Campaign</button>
                  {isUnlocked && <button className="btn btn-cyan btn-sm" onClick={exportBrandKit}><Download size={11}/> Export Brand Kit</button>}
                </div>
              </div>
            </div>
          )}

        </div>
      </div>
      {toast && <div className="toast"><Check size={13}/> {toast}</div>}
    </>
  );
}


const container = document.getElementById('root');
const root = ReactDOM.createRoot(container);
root.render(React.createElement(ToolzyoBrandVoiceStudio));
</script>
</body>
</html>
