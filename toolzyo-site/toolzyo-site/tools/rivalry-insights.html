  /* ── REPORT SECTIONS ───────────────────────────────────────────────────── */

    { id:'overview',   label:'Overview',    icon:<TrendingUp size={13}/> },
    { id:'profiles',   label:'Profiles',    icon:<Shield size={13}/> },
    { id:'battle',     label:'Battle Cards', icon:<Crosshair size={13}/> },
    { id:'map',        label:'Map',          icon:<Map size={13}/> },
    { id:'gaps',       label:'Gaps',         icon:<Lightbulb size={13}/> },
    { id:'strategy',   label:'Strategy',     icon:<Star size={13}/> },
  ];


  const GateOverlay = ({ codeId }) => (
    <div className="gate-overlay">
      <div className="gate-overlay-inner">
        <div className="gate-lock">🔒</div>
        <h3 className="gate-title">Your personalized results are ready</h3>
        <p className="gate-sub">You're seeing a preview based on your inputs. Unlock the full output or book a call to go through it together.</p>
        <div className="gate-options">
          <button className="gate-opt gate-opt-pay" onClick={()=>{ localStorage.setItem('tz_access_session','1'); setIsUnlocked(true); window.open('https://toolzyo.com/checkout?plan=session','_blank'); }}>
            <div className="gate-opt-label">This Result</div>
            <div className="gate-opt-price">$57</div>
            <div className="gate-opt-desc">Unlock this full output + all downloads for this session</div>
          </button>
          <button className="gate-opt gate-opt-month" onClick={()=>{ window.open('https://toolzyo.com/checkout?plan=14day','_blank'); }}>
            <div className="gate-opt-label">This Tool · 14 Days</div>
            <div className="gate-opt-price">$127</div>
            <div className="gate-opt-desc">Unlimited use of this tool for 14 days · all results unlocked</div>
          </button>
        </div>
        <div className="gate-divider">
          <div className="gate-divider-line"/>
          <span className="gate-divider-text">or let us do it for you</span>
          <div className="gate-divider-line"/>
        </div>
        <button className="gate-opt gate-opt-dfy" style={{width:'100%',marginBottom:'0.65rem'}} onClick={()=>window.open('https://toolzyo.com/#pricing','_blank')}>
          <div className="gate-opt-label" style={{color:'#fbbf24'}}>⭐ Done-For-You — Strategy Snapshot</div>
          <div className="gate-opt-price" style={{background:'linear-gradient(135deg,#fbbf24,#f59e0b)',WebkitBackgroundClip:'text',WebkitTextFillColor:'transparent',backgroundClip:'text'}}>$397</div>
          <div className="gate-opt-desc">Haze runs this for your business, delivers the polished report — you do nothing</div>
        </button>
        <button className="gate-call-btn" onClick={()=>window.open('https://toolzyo.com/#start','_blank')}>
          📅 Book a discovery call first — talk through it live
        </button>
        {!showCodeEntry && (
          <button className="gate-already" onClick={()=>setShowCodeEntry(true)}>Already have an access code?</button>
        )}
        {showCodeEntry && (
          <div className="gate-code-row">
            <input className="gate-code-input" id={codeId} placeholder="Enter access code" onKeyDown={e=>e.key==='Enter'&&unlockAccess(codeId)}/>
            <button className="gate-code-btn" onClick={()=>unlockAccess(codeId)}>Unlock</button>
          </div>
        )}
      </div>
    </div>
  );

  return (
    <>
      <style>{css}</style>
      <div className="ri-root">
        <div className="ri-inner">

          {/* HEADER */}
          <div className="ri-header">
            <div className="ri-wordmark">Toolzyo<em>.</em></div>
            <h1 className="ri-title">Rivalry<br/><span className="ri-grd">Insights</span></h1>
            <p className="ri-sub">Competitive intelligence that reveals exactly how to win — profiles, battle cards & opportunity gaps</p>
            <div className="ri-chips">
              <span className="chip cb"><Shield size={10}/> SWOT Analysis</span>
              <span className="chip cp"><Crosshair size={10}/> Battle Cards</span>
              <span className="chip cc"><Lightbulb size={10}/> Opportunity Gaps</span>
              <span className="chip cr"><Map size={10}/> Positioning Map</span>
            </div>
          </div>

          <div className="ri-layout">

            {/* ── LEFT ─────────────────────────────────────────────────── */}
            <div>
              <div className="panel">
                <p className="panel-title"><Search size={16}/> Intelligence Brief</p>

                <p className="eyebrow">Client Brand *</p>
                <input className="t-input" type="text" placeholder="e.g. Toolzyo Studio"
                  value={clientBrand} onChange={e=>setClientBrand(e.target.value)}/>

                <div className="divider"/>

                <p className="eyebrow">Competitors * ({activeComps.length} added)</p>
                <div className="comp-input-row">
                  {competitors.map((c,i) => (
                    <div key={i} className="comp-item">
                      <div className="comp-num" style={{background:`linear-gradient(135deg,${COMP_COLORS[i%COMP_COLORS.length].bg},${COMP_COLORS[i%COMP_COLORS.length].border})`}}>{i+1}</div>
                      <input className="t-input" type="text"
                        placeholder={`Competitor ${i+1} name`}
                        value={c} onChange={e=>setComp(i,e.target.value)}/>
                      {competitors.length > 1 && (
                        <button className="btn-rem" onClick={()=>remComp(i)}>×</button>
                      )}
                    </div>
                  ))}
                </div>
                {competitors.length < 5 && (
                  <button className="btn-add" style={{marginTop:'0.6rem'}} onClick={addComp}>+ Add Competitor</button>
                )}

                <div className="divider"/>

                <p className="eyebrow">Target Market</p>
                <textarea className="t-input" rows={2}
                  placeholder="e.g. Small business owners aged 25-45 using social media for growth"
                  value={targetMarket} onChange={e=>setTargetMarket(e.target.value)}/>

                <div className="divider"/>

                <p className="eyebrow">Industry (optional)</p>
                <input className="t-input" type="text" placeholder="e.g. Creator Economy, SaaS, E-commerce"
                  value={industry} onChange={e=>setIndustry(e.target.value)}/>
              </div>

              <div className="panel">
                <p className="panel-title"><Map size={16}/> Positioning Map Axes</p>
                <p className="eyebrow">X Axis</p>
                <input className="t-input" type="text" value={xAxis} onChange={e=>setXAxis(e.target.value)}/>
                <div className="divider"/>
                <p className="eyebrow">Y Axis</p>
                <input className="t-input" type="text" value={yAxis} onChange={e=>setYAxis(e.target.value)}/>
                <p style={{fontSize:'0.72rem',color:'rgba(240,242,255,0.3)',marginTop:'0.5rem',lineHeight:1.6}}>Customize the axes to match what matters most in your market.</p>
              </div>

              <button className={`btn btn-gen${isRunning?' running':''}`}
                disabled={isRunning||!clientBrand.trim()||activeComps.length===0}
                onClick={generate}>
                {isRunning
                  ? <><Loader size={15} className="spin"/> Analyzing...</>
                  : <><Zap size={15}/> Run Competitive Analysis</>}
              </button>

              {(isRunning||phase==='done'||phase==='error') && (
                <div className="step-list" style={{marginTop:'1rem'}}>
                  {steps.map(s=>(
                    <div key={s.id} className={`step-item${s.status==='active'?' active':s.status==='done'?' done':''}`}>
                      <div className="sdot"/>
                      <span className="slabel">{s.status==='done'?'✓ ':s.status==='active'?'⟳ ':''}{s.label}</span>
                    </div>
                  ))}
                </div>
              )}
            </div>

            {/* ── RIGHT ────────────────────────────────────────────────── */}
            <div>
              <div className="panel" style={{minHeight:520}}>

                {phase==='idle' && (
                  <div className="out-empty">
                    <Crosshair size={44} strokeWidth={1} color="#9D4EFF"/>
                    <p>Enter your client brand and competitors, then run the analysis</p>
                  </div>
                )}
                {isRunning && !r && (
                  <div className="out-empty">
                    <Loader size={38} strokeWidth={1} color="#9D4EFF" className="spin"/>
                    <p>Researching and building your competitive intelligence report...</p>
                  </div>
                )}
                {phase==='error' && (
                  <div className="out-empty">
                    <AlertTriangle size={36} color="#ff8080"/>
                    <p style={{color:'#ff8080'}}>Something went wrong. Check your inputs and try again.</p>
                  </div>
                )}

                {r && (
                  <>
                    <div className="tabs">
                      {TABS.map(t=>(
                        <button key={t.id} className={`tab${activeTab===t.id?' on':''}`} onClick={()=>setActiveTab(t.id)}>
                          {t.icon} {t.label}
                        </button>
                      ))}
                    </div>

                    <div className="export-bar">
                      <button className="btn btn-ghost btn-sm" onClick={copyReport}><Copy size={12}/> Copy JSON</button>
                      <button className="btn btn-cyan btn-sm" onClick={()=>gatedDownload(downloadReport)}><Download size={12}/> Download Report</button>
                    </div>

                    {/* OVERVIEW */}
                    {activeTab==='overview' && r.overview && (
                      <>
                        <div className="overview-grid">
                          <div className="ov-card">
                            <p className="ov-label">Client Positioning</p>
                            <p className="ov-desc">{r.overview.clientPositioning}</p>
                          </div>
                          <div className="ov-card" style={{borderColor:'rgba(255,68,68,0.25)'}}>
                            <p className="ov-label" style={{color:'#ff8080'}}>Biggest Threat</p>
                            <p className="ov-val">{r.overview.biggestThreat}</p>
                          </div>
                          <div className="ov-card" style={{borderColor:'rgba(0,232,192,0.25)'}}>
                            <p className="ov-label" style={{color:'#00E8C0'}}>Biggest Opportunity</p>
                            <p className="ov-desc">{r.overview.biggestOpportunity}</p>
                          </div>
                        </div>
                        <div style={{background:'rgba(7,10,32,0.6)',border:'1px solid rgba(123,43,255,0.15)',borderRadius:12,padding:'1rem 1.1rem'}}>
                          <p className="eyebrow" style={{marginBottom:'0.6rem'}}>Market Summary</p>
                          <p style={{fontSize:'0.85rem',lineHeight:'1.8',color:'rgba(240,242,255,0.72)'}}>{r.overview.marketSummary}</p>
                        </div>
                      </>
                    )}

                    {/* PROFILES */}
                    {activeTab==='profiles' && (
                      <div className="comp-cards">
                        {(r.competitors||[]).map((comp,i)=>{
                          const col = COMP_COLORS[i%COMP_COLORS.length];
                          const open = expandedComp[comp.name] !== false;
                          return (
                            <div key={i} className="comp-card">
                              <div className="comp-card-head" onClick={()=>setExpandedComp(p=>({...p,[comp.name]:!open}))}>
                                <div className="comp-avatar" style={{background:col.bg,border:`1px solid ${col.border}`,color:col.text}}>
                                  {comp.name.charAt(0)}
                                </div>
                                <span className="comp-name">{comp.name}</span>
                                <span className="comp-tag" style={{background:col.bg,border:`1px solid ${col.border}`,color:col.text}}>{comp.marketShare || 'competitor'}</span>
                                {open ? <ChevronUp size={14} color="rgba(240,242,255,0.35)"/> : <ChevronDown size={14} color="rgba(240,242,255,0.35)"/>}
                              </div>
                              {open && (
                                <div className="comp-body">
                                  <div className="comp-section">
                                    <p className="comp-section-title" style={{color:col.text}}>Positioning</p>
                                    <p style={{fontSize:'0.82rem',color:'rgba(240,242,255,0.65)',lineHeight:1.7}}>{comp.positioning}</p>
                                  </div>
                                  <div className="comp-section">
                                    <p className="comp-section-title" style={{color:col.text}}>Key Tactics</p>
                                    <div className="bullet-list">
                                      {(comp.keyTactics||[]).map((t,j)=>(
                                        <div key={j} className="bullet-item">
                                          <div className="dot" style={{background:col.text}}/>
                                          {t}
                                        </div>
                                      ))}
                                    </div>
                                  </div>
                                  <div className="sw-row">
                                    <div className="sw-block s">
                                      <p className="sw-label">Strengths</p>
                                      {(comp.strengths||[]).map((s,j)=><p key={j} className="sw-item">{s}</p>)}
                                    </div>
                                    <div className="sw-block w">
                                      <p className="sw-label">Weaknesses</p>
                                      {(comp.weaknesses||[]).map((w,j)=><p key={j} className="sw-item">{w}</p>)}
                                    </div>
                                  </div>
                                </div>
                              )}
                            </div>
                          );
                        })}
                      </div>
                    )}

                    {/* BATTLE CARDS */}
                    {activeTab==='battle' && (
                      <div className="battle-grid">
                        {(r.battleCards||[]).map((bc,i)=>{
                          const col = COMP_COLORS[i%COMP_COLORS.length];
                          return (
                            <div key={i} className="battle-card">
                              <div className="battle-head">
                                <div className="battle-avatar" style={{background:col.bg,border:`1px solid ${col.border}`,color:col.text}}>
                                  {bc.competitor.charAt(0)}
                                </div>
                                <div>
                                  <p className="battle-name">{bc.competitor}</p>
                                  <p className="battle-subtitle">"{bc.tagline}"</p>
                                </div>
                              </div>
                              <div className="battle-body">
                                <div className="battle-section">
                                  <p className="battle-section-label vuln"><AlertTriangle size={10}/> Their Vulnerabilities</p>
                                  {(bc.vulnerabilities||[]).map((v,j)=><p key={j} className="battle-item">{v}</p>)}
                                </div>
                                <div className="battle-section">
                                  <p className="battle-section-label beat"><Target size={10}/> How to Beat Them</p>
                                  {(bc.howToBeat||[]).map((v,j)=><p key={j} className="battle-item">{v}</p>)}
                                </div>
                                <div className="battle-section">
                                  <p className="battle-section-label say"><Sparkles size={10}/> What to Say</p>
                                  {(bc.whatToSay||[]).map((v,j)=><p key={j} className="battle-item">{v}</p>)}
                                </div>
                              </div>
                            </div>
                          );
                        })}
                      </div>
                    )}

                    {/* POSITIONING MAP */}
                    {activeTab==='map' && (
                      <div className="pos-map-wrap">
                        <div className="pos-map">
                          <div className="pos-axis-h"/>
                          <div className="pos-axis-v"/>
                          <span className="pos-label top">↑ High</span>
                          <span className="pos-label bottom">↓ Low</span>
                          <span className="pos-label left">← Low</span>
                          <span className="pos-label right">High →</span>

                          {/* Client dot */}
                          <div className="pos-dot" style={{left:`${r.positioningMap?.clientPosition?.x||50}%`,top:`${r.positioningMap?.clientPosition?.y||50}%`}}>
                            <div className="pos-dot-circle" style={{background:'rgba(42,47,255,0.3)',border:'2px solid #2A2FFF',color:'#818cf8'}}>
                              {clientBrand.charAt(0)}
                            </div>
                            <p className="pos-dot-label" style={{color:'#818cf8'}}>{clientBrand}</p>
                          </div>

                          {/* Competitor dots */}
                          {(r.positioningMap?.competitorPositions||[]).map((pos,i)=>{
                            const col = COMP_COLORS[i%COMP_COLORS.length];
                            const x = pos.x || MAP_POSITIONS[i%MAP_POSITIONS.length].x;
                            const y = pos.y || MAP_POSITIONS[i%MAP_POSITIONS.length].y;
                            return (
                              <div key={i} className="pos-dot" style={{left:`${x}%`,top:`${y}%`}}>
                                <div className="pos-dot-circle" style={{background:col.bg,border:`2px solid ${col.border}`,color:col.text}}>
                                  {pos.name.charAt(0)}
                                </div>
                                <p className="pos-dot-label" style={{color:col.text}}>{pos.name}</p>
                              </div>
                            );
                          })}
                        </div>

                        <div className="pos-axis-labels">
                          <span className="pos-axis-label">← {xAxis.split('→')[0]?.trim() || 'Low'}</span>
                          <span className="pos-axis-label" style={{textAlign:'center'}}>{xAxis}</span>
                          <span className="pos-axis-label">{xAxis.split('→')[1]?.trim() || 'High'} →</span>
                        </div>

                        <div className="pos-legend" style={{marginTop:'0.8rem'}}>
                          <div className="pos-legend-item">
                            <div className="pos-legend-dot" style={{background:'#2A2FFF'}}/>
                            <span>{clientBrand} (You)</span>
                          </div>
                          {(r.positioningMap?.competitorPositions||[]).map((pos,i)=>{
                            const col = COMP_COLORS[i%COMP_COLORS.length];
                            return (
                              <div key={i} className="pos-legend-item">
                                <div className="pos-legend-dot" style={{background:col.text}}/>
                                <span>{pos.name}</span>
                              </div>
                            );
                          })}
                        </div>
                      </div>
                    )}

                    {/* GAPS */}
                    {activeTab==='gaps' && (
                      <div className="gap-grid">
                        {(r.opportunityGaps||[]).map((g,i)=>(
                          <div key={i} className="gap-card">
                            <span className="gap-num">{String(i+1).padStart(2,'0')}</span>
                            <p className="gap-title">{g.title}</p>
                            <p className="gap-desc">{g.description}</p>
                            <div className="gap-action">
                              <span className="gap-action-label">Action →</span>
                              <span className="gap-action-text">{g.actionStep}</span>
                            </div>
                          </div>
                        ))}
                      </div>
                    )}

                    {/* STRATEGY */}
                    {activeTab==='strategy' && (
                      <div className="strat-grid">
                        {(r.winningStrategies||[]).map((s,i)=>(
                          <div key={i} className={`strat-card${s.priority==='high'?' priority':''}`}>
                            <span className={`strat-badge ${s.priority==='high'?'high':s.priority==='medium'?'med':'low'}`}>
                              {s.priority} priority
                            </span>
                            <p className="strat-title">{s.title}</p>
                            <p className="strat-desc">{s.description}</p>
                          </div>
                        ))}
                      </div>
                    )}
                  </>
                  {!isUnlocked && <GateOverlay codeId="rivalryCode"/>}
                  </div>
                )}
              </div>
            </div>
          </div>
        </div>
      </div>
      {toast && <div className="toast"><Check size={13}/> Copied to clipboard</div>}

      {showPaywall && (
        <div className="pw-overlay" onClick={e=>{ if(e.target===e.currentTarget){ setShowPaywall(false); } }}>
          <div className="pw-card">
            <div className="pw-lock">🔒</div>
            <h2 className="pw-title">Your results are ready to save</h2>
            <p className="pw-sub">Generate freely — download your personalized output when you're on a package or grab one-time access.</p>
            <div className="pw-options">
              <button className="pw-opt pw-opt-primary" onClick={()=>{ setShowPaywall(false); window.open('https://toolzyo.com/#pricing','_blank'); }}>
                <div className="pw-opt-label">📦 View Packages</div>
                <div className="pw-opt-text">Content Engine · Full Service · Strategy Snapshot</div>
                <div className="pw-opt-price">From $397 · Includes unlimited downloads</div>
              </button>
              <button className="pw-opt pw-opt-secondary" onClick={()=>{ setShowPaywall(false); window.open('https://toolzyo.com/vault','_blank'); }}>
                <div className="pw-opt-label">⚡ One-Time Download</div>
                <div className="pw-opt-text">Pay once, download this result now</div>
                <div className="pw-opt-price">$9 per export — available in The Vault</div>
              </button>
            </div>
            <div className="pw-divider"/>
            <p className="pw-code-lbl">Already have access? Enter your code</p>
            <div className="pw-code-row">
              <input className="pw-code-input" id="pwCodeInput" placeholder="Access code" type="text" onKeyDown={e=>e.key==='Enter'&&unlockWithCode('pwCodeInput')}/>
              <button className="pw-code-btn" onClick={()=>unlockWithCode('pwCodeInput')}>Unlock</button>
            </div>
            <button className="pw-dismiss" onClick={()=>setShowPaywall(false)}>Continue browsing without downloading</button>
          </div>
        </div>
      )}

    </>
  );
}


const container = document.getElementById('root');
const root = ReactDOM.createRoot(container);
root.render(React.createElement(ToolzyoRivalryInsights));
</script>
</body>
</html>
